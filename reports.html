<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reports — BTID</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()"><svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg></button>
        <div>
          <div class="topbar-title">Reports</div>
          <div class="topbar-sub">Tryout outcomes across all batches</div>
        </div>
      </div>
      <div class="topbar-right" style="display:flex;align-items:center;gap:8px">
        <div id="seasonSelectorWrap"></div>
        <select class="filter-select" id="filterBatch" onchange="loadReport()">
          <option value="">All batches</option>
        </select>
        <select class="filter-select" id="filterDistrict" onchange="loadReport()">
          <option value="">All districts</option>
        </select>
      </div>
    </div>

    <div class="content" id="reportContent">
      <div class="empty-state"><div class="empty-title">Loading reports...</div></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="js/app.js"></script>
<script>
Auth.require();
buildSidebar('reports');
buildSeasonSelector('seasonSelectorWrap');

// Populate districts
UGANDA_DISTRICTS.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d; opt.textContent = d;
  document.getElementById('filterDistrict').appendChild(opt);
});

// Load tryout batches for filter
async function loadBatches() {
  try {
    const r = await TryoutAPI.getAll();
    const batches = r.tryouts || r || [];
    const sel = document.getElementById('filterBatch');
    batches.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.id; opt.textContent = b.name;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

async function loadReport() {
  const batch    = document.getElementById('filterBatch').value;
  const district = document.getElementById('filterDistrict').value;
  let stats = {}, players = [];

  try {
    stats   = await StatsAPI.reports({ batch_id: batch, district });
    const r = await PlayerAPI.getAll({ batch_id: batch, district, limit: 200 });
    players = r.players || r || [];
  } catch(e) {}

  const total      = players.length;
  const invited    = stats.invited    || total;
  const attended   = stats.attended   || players.filter(p => p.attended).length;
  const admitted   = players.filter(p => p.outcome === 'admitted').length;
  const eliminated = players.filter(p => p.outcome === 'eliminated').length;
  const pending    = players.filter(p => !p.outcome).length;

  // Tier breakdown
  const t1  = players.filter(p => String(p.tier) === '1').length;
  const t15 = players.filter(p => String(p.tier) === '1.5').length;
  const t2  = players.filter(p => String(p.tier) === '2').length;
  const t3  = players.filter(p => String(p.tier) === '3').length;

  // Elimination reasons
  const reasonMap = {};
  players.filter(p => p.elimination_reason).forEach(p => {
    p.elimination_reason.split(';').forEach(r => {
      const k = r.trim();
      if (k) reasonMap[k] = (reasonMap[k]||0) + 1;
    });
  });
  const reasons = Object.entries(reasonMap).sort((a,b) => b[1]-a[1]);

  // District breakdown
  const distMap = {};
  players.forEach(p => {
    const d = p.district || 'Unknown';
    if (!distMap[d]) distMap[d] = { admitted:0, eliminated:0, pending:0 };
    if (p.outcome === 'admitted')   distMap[d].admitted++;
    else if (p.outcome === 'eliminated') distMap[d].eliminated++;
    else distMap[d].pending++;
  });
  const distList = Object.entries(distMap).sort((a,b) => (b[1].admitted+b[1].eliminated) - (a[1].admitted+a[1].eliminated));

  const el = document.getElementById('reportContent');
  el.innerHTML = `
    <!-- Summary cards -->
    <div class="metrics-grid" style="margin-bottom:14px">
      ${[
        { label:'Invited',    val:fmt(invited),    cls:'' },
        { label:'Attended',   val:fmt(attended),   cls:'' },
        { label:'Admitted',   val:fmt(admitted),   cls:'' },
        { label:'Eliminated', val:fmt(eliminated), cls:'red' },
        { label:'Pending',    val:fmt(pending),    cls:'amber' },
      ].map(s => `
        <div class="metric-card">
          <div class="mc-value" style="${s.cls==='red'?'color:var(--red)':s.cls==='amber'?'color:var(--amber)':''}">${s.val}</div>
          <div class="mc-label">${s.label}</div>
        </div>`).join('')}
    </div>

    <!-- Funnel chart -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><span class="card-title">Tryout Funnel</span></div>
      ${[
        { label:'Invited',    count:invited,    pct:100,                              color:'var(--green)' },
        { label:'Attended',   count:attended,   pct:invited?Math.round(attended/invited*100):0,   color:'var(--green)' },
        { label:'Admitted',   count:admitted,   pct:invited?Math.round(admitted/invited*100):0,   color:'var(--green)' },
        { label:'Eliminated', count:eliminated, pct:invited?Math.round(eliminated/invited*100):0, color:'var(--red)' },
      ].map(row => `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="font-family:var(--font2);font-size:.72rem;font-weight:700;color:var(--text);min-width:80px">${row.label}</div>
          <div class="bar-track" style="flex:1">
            <div class="bar-fill" style="width:${row.pct}%;background:${row.color}"></div>
          </div>
          <div style="font-family:var(--font1);font-size:.88rem;color:var(--text);min-width:50px;text-align:right">${fmt(row.count)}</div>
          <div style="font-family:var(--font2);font-size:.65rem;font-weight:700;color:var(--muted);min-width:36px;text-align:right">${row.pct}%</div>
        </div>`).join('')}
    </div>

    <div class="grid-2" style="margin-bottom:14px">
      <!-- Tier breakdown -->
      <div class="card">
        <div class="card-head"><span class="card-title">Tier Breakdown</span></div>
        ${[
          { tier:'1',   label:'Tier 1',   count:t1,  color:'#009c41', bg:'#e8f5ee' },
          { tier:'1.5', label:'Tier 1.5', count:t15, color:'#7dbf3a', bg:'#f0f8e8' },
          { tier:'2',   label:'Tier 2',   count:t2,  color:'#f5a623', bg:'#fef3dc' },
          { tier:'3',   label:'Tier 3',   count:t3,  color:'#e53935', bg:'#fdeaea' },
        ].map(t => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
            <div style="font-family:var(--font2);font-size:.75rem;font-weight:700;color:var(--text);flex:1">${t.label}</div>
            <div class="bar-track" style="flex:2">
              <div class="bar-fill" style="width:${total?Math.round(t.count/total*100):0}%;background:${t.color}"></div>
            </div>
            <div style="font-family:var(--font1);font-size:.88rem;color:var(--text);min-width:30px;text-align:right">${t.count}</div>
          </div>`).join('')}
      </div>

      <!-- Elimination reasons -->
      <div class="card">
        <div class="card-head"><span class="card-title">Elimination Reasons</span></div>
        ${reasons.length ? reasons.map(([reason, count]) => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="font-family:var(--font2);font-size:.7rem;font-weight:600;color:var(--text);flex:1;line-height:1.3">${reason}</div>
            <div class="bar-track" style="flex:1">
              <div class="bar-fill r" style="width:${eliminated?Math.round(count/eliminated*100):0}%"></div>
            </div>
            <div style="font-family:var(--font1);font-size:.85rem;color:var(--red);min-width:28px;text-align:right">${count}</div>
          </div>`).join('')
        : '<div style="font-family:var(--font2);font-size:.72rem;color:var(--muted)">No eliminations yet.</div>'}
      </div>
    </div>

    <!-- District breakdown -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><span class="card-title">Breakdown by District</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>District</th><th>Total</th><th>Admitted</th><th>Eliminated</th><th>Pending</th><th>Admit Rate</th>
          </tr></thead>
          <tbody>
            ${distList.length ? distList.map(([d, data]) => {
              const tot = data.admitted + data.eliminated + data.pending;
              const rate = tot ? Math.round(data.admitted/tot*100) : 0;
              return `<tr>
                <td style="font-weight:800">${d}</td>
                <td>${tot}</td>
                <td style="color:var(--green);font-weight:800">${data.admitted}</td>
                <td style="color:var(--red)">${data.eliminated}</td>
                <td style="color:var(--muted)">${data.pending}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:6px">
                    <div class="bar-track" style="width:60px"><div class="bar-fill g" style="width:${rate}%"></div></div>
                    <span style="font-family:var(--font1);font-size:.78rem;color:var(--green-dark)">${rate}%</span>
                  </div>
                </td>
              </tr>`;
            }).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted)">No data</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Admitted players list -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Admitted Players</span>
        <span style="font-family:var(--font2);font-size:.7rem;font-weight:700;color:var(--green)">${admitted} total</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>District</th><th>School</th><th>Tier</th><th>Class</th></tr></thead>
          <tbody>
            ${players.filter(p=>p.outcome==='admitted').map(p=>`
              <tr class="clickable" onclick="window.location.href='profile.html?id=${p.id}'">
                <td style="font-weight:800">${p.name}</td>
                <td>${p.district||'—'}</td>
                <td>${p.school||'—'}</td>
                <td>${tierBadge(p.tier)}</td>
                <td>${p.class||'—'}</td>
              </tr>`).join('') ||
            '<tr><td colspan="5" style="text-align:center;color:var(--muted)">No admitted players yet</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Eliminated players list -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Eliminated Players</span>
        <span style="font-family:var(--font2);font-size:.7rem;font-weight:700;color:var(--red)">${eliminated} total</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>District</th><th>Tier</th><th>Reason</th></tr></thead>
          <tbody>
            ${players.filter(p=>p.outcome==='eliminated').map(p=>`
              <tr class="clickable" onclick="window.location.href='profile.html?id=${p.id}'">
                <td style="font-weight:800">${p.name}</td>
                <td>${p.district||'—'}</td>
                <td>${tierBadge(p.tier)}</td>
                <td style="font-family:var(--font2);font-size:.68rem;color:var(--muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(p.elimination_reason||'—').split(';')[0]}</td>
              </tr>`).join('') ||
            '<tr><td colspan="4" style="text-align:center;color:var(--muted)">No eliminated players yet</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

loadBatches();
loadReport();
</script>
</body>
</html>
