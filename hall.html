<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hall of Fame - BTID</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════════════════
     HALL OF FAME — uses global design system variables only.
     ══════════════════════════════════════════════════════════════ */

  @keyframes hofFadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes hofSlideInRight {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes hofDrawLine { to { stroke-dashoffset: 0; } }
  @keyframes hofDrawArc  { to { stroke-dashoffset: 0; } }
  @keyframes hofGrowBar  { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  .hof-sec {
    opacity: 0;
    animation: hofFadeUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  .hof-sec.d0  { animation-delay: 0.00s; }
  .hof-sec.d1  { animation-delay: 0.06s; }
  .hof-sec.d2  { animation-delay: 0.12s; }
  .hof-sec.d3  { animation-delay: 0.18s; }
  .hof-sec.d4  { animation-delay: 0.24s; }
  .hof-sec.d5  { animation-delay: 0.30s; }
  .hof-sec.d6  { animation-delay: 0.36s; }
  .hof-sec.d7  { animation-delay: 0.42s; }
  .hof-sec.d8  { animation-delay: 0.48s; }
  .hof-sec.d9  { animation-delay: 0.54s; }
  .hof-sec.d10 { animation-delay: 0.60s; }
  .hof-sec.d11 { animation-delay: 0.66s; }
  .hof-sec.d12 { animation-delay: 0.72s; }

  .metrics-grid.hof-cascade .metric-card {
    opacity: 0;
    animation: hofFadeUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  .metrics-grid.hof-cascade .metric-card:nth-child(1) { animation-delay: 0.10s; }
  .metrics-grid.hof-cascade .metric-card:nth-child(2) { animation-delay: 0.20s; }
  .metrics-grid.hof-cascade .metric-card:nth-child(3) { animation-delay: 0.30s; }

  /* ══════════════════════════════════════════════════════════════
     SCOUT IDENTITY BANNER
     ══════════════════════════════════════════════════════════════ */
  .hof-banner {
    position: relative;
    background:
      radial-gradient(600px 400px at var(--mx, 50%) var(--my, 50%), rgba(179,212,240,0.22), transparent 60%),
      linear-gradient(135deg, var(--green-dark) 0%, var(--green) 55%, var(--dark) 100%);
    border-radius: var(--radius);
    padding: 24px 26px;
    color: #fff;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .hof-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, transparent 60%, rgba(0,0,0,.15) 100%);
    pointer-events: none;
  }

  .hof-banner-row {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .hof-avatar-wrap {
    position: relative;
    width: 96px; height: 96px;
    flex-shrink: 0;
  }
  .hof-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: var(--green-pale);
    border: 3px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.15s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .hof-avatar:hover { transform: scale(1.03); }
  .hof-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .hof-avatar-ini {
    font-family: var(--font1);
    font-size: 2rem;
    color: var(--green-dark);
  }
  .hof-avatar-menu {
    position: absolute;
    bottom: -2px; right: -2px;
    width: 28px; height: 28px;
    background: #fff;
    color: var(--green-dark);
    border-radius: 50%;
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .hof-avatar-menu:hover {
    background: var(--green-dark);
    color: #fff;
  }
  .hof-avatar-menu svg {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .hof-banner-info {
    flex: 1;
    min-width: 240px;
  }
  .hof-greet {
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    margin-bottom: 2px;
  }
  .hof-greet-date {
    font-family: var(--font2);
    font-size: 0.62rem;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .hof-banner-name {
    font-family: var(--font1);
    font-size: 1.6rem;
    color: #fff;
    letter-spacing: -0.02em;
    margin-top: 8px;
    line-height: 1.1;
  }
  .hof-banner-role {
    font-family: var(--font2);
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--green-light);
    margin-top: 2px;
  }

  .hof-motto {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 100px;
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 700;
    color: rgba(255,255,255,0.92);
    cursor: pointer;
    transition: all 0.15s;
    max-width: 100%;
  }
  .hof-motto:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.35);
  }
  .hof-motto.empty { color: rgba(255,255,255,0.55); font-style: italic; }
  .hof-motto svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
  .hof-motto-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 400px;
  }
  .hof-motto-input {
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 700;
    min-width: 200px;
    width: 100%;
  }
  .hof-motto-input::placeholder { color: rgba(255,255,255,0.45); }

  .hof-banner-pills {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .hof-bpill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    font-family: var(--font2);
    font-size: 0.65rem;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: default;
    transition: all 0.15s;
  }
  .hof-bpill.editable { cursor: pointer; }
  .hof-bpill.editable:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.3);
  }
  .hof-bpill-input {
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: var(--font2);
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    min-width: 140px;
  }

  /* Lifetime stats strip */
  .hof-lifetime {
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    padding: 0 4px 14px;
    text-align: center;
  }
  .hof-lifetime strong {
    color: var(--green-dark);
    font-weight: 900;
  }

  /* Season selector row */
  .hof-season-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  /* ══════════════════════════════════════════════════════════════
     ON THIS DAY
     ══════════════════════════════════════════════════════════════ */
  .hof-otd {
    background: linear-gradient(135deg, var(--green-pale), var(--white));
    border: 1.5px solid var(--green-mid);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .hof-otd:hover {
    border-color: var(--green);
    transform: translateX(2px);
    box-shadow: 0 3px 12px var(--green-shadow);
  }
  .hof-otd-icon {
    width: 40px; height: 40px;
    background: var(--green);
    color: #fff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.2rem;
  }
  .hof-otd-body { flex: 1; min-width: 0; }
  .hof-otd-label {
    font-family: var(--font2);
    font-size: 0.58rem;
    font-weight: 900;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 3px;
  }
  .hof-otd-text {
    font-family: var(--font2);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }
  .hof-otd-text strong { color: var(--green-dark); font-weight: 900; }
  .hof-otd-arrow {
    color: var(--green);
    font-size: 1.2rem;
    font-weight: 900;
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════════════
     ACHIEVEMENT MOMENTS
     ══════════════════════════════════════════════════════════════ */
  .hof-achieve {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--green);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }
  .hof-achieve-emoji { font-size: 1.3rem; flex-shrink: 0; }
  .hof-achieve-body { flex: 1; min-width: 0; }
  .hof-achieve-title {
    font-family: var(--font2);
    font-size: 0.78rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }
  .hof-achieve-sub {
    font-family: var(--font2);
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--muted);
    margin-top: 2px;
  }
  .hof-achieve-dismiss {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .hof-achieve-dismiss:hover {
    background: var(--bg);
    color: var(--text);
  }

  /* ══════════════════════════════════════════════════════════════
     TALENT TIERS — three color-coded sections (Elite / Strong / Ahead)
     Each section is its own card with a colored accent.
     ══════════════════════════════════════════════════════════════ */
  .hof-tier {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .hof-tier::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--tier-color, var(--green));
  }

  /* Tier-specific accents — each gets its own color signature */
  .hof-tier.elite  { --tier-color: var(--green); }
  .hof-tier.ahead  { --tier-color: var(--amber); }

  .hof-tier-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--border);
  }
  .hof-tier-title-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hof-tier-badge {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    background: var(--tier-color, var(--green));
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .hof-tier.elite  .hof-tier-badge { background: var(--green); }
  .hof-tier.ahead  .hof-tier-badge { background: var(--amber); }

  .hof-tier-title {
    font-family: var(--font2);
    font-size: 0.82rem;
    font-weight: 900;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    line-height: 1;
  }
  .hof-tier-rule {
    font-family: var(--font2);
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }
  .hof-tier-count {
    font-family: var(--font1);
    font-size: 1.5rem;
    color: var(--tier-color, var(--green-dark));
    line-height: 1;
  }
  .hof-tier.elite  .hof-tier-count { color: var(--green-dark); }
  .hof-tier.ahead  .hof-tier-count { color: var(--amber-text, var(--amber)); }

  .hof-reel {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 2px 2px 8px 2px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    margin: 0 -2px;
  }
  .hof-reel::-webkit-scrollbar { height: 6px; }
  .hof-reel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
  .hof-reel::-webkit-scrollbar-track { background: transparent; }

  .hof-find {
    flex: 0 0 180px;
    scroll-snap-align: start;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
    opacity: 0;
    animation: hofSlideInRight 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    position: relative;
  }
  .hof-find:nth-child(1) { animation-delay: 0.10s; }
  .hof-find:nth-child(2) { animation-delay: 0.16s; }
  .hof-find:nth-child(3) { animation-delay: 0.22s; }
  .hof-find:nth-child(4) { animation-delay: 0.28s; }
  .hof-find:nth-child(5) { animation-delay: 0.34s; }
  .hof-find:nth-child(6) { animation-delay: 0.40s; }
  .hof-find:nth-child(7) { animation-delay: 0.46s; }
  .hof-find:nth-child(8) { animation-delay: 0.52s; }

  /* Tier-aware hover glow */
  .hof-tier.elite .hof-find:hover {
    border-color: var(--green);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px var(--green-shadow);
  }
  .hof-tier.ahead .hof-find:hover {
    border-color: var(--amber);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,158,11,0.18);
  }

  .hof-find-photo {
    width: 100%; height: 130px;
    background: var(--green-pale) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border-bottom: 1.5px solid var(--border);
  }
  /* Tier-aware initials background tints */
  .hof-tier.ahead  .hof-find-photo:not([style]) { background: var(--amber-pale, #fef3c7); }

  .hof-find-ini {
    font-family: var(--font1);
    font-size: 2rem;
    color: var(--green-dark);
    opacity: 0.35;
  }
  .hof-tier.ahead  .hof-find-ini { color: var(--amber-text, #92400e); }

  /* Velocity stat text color matches tier */
  .hof-tier.ahead  .hof-find-stat { color: var(--amber-text, #92400e); }

  /* Reason line for Ahead-of-his-age cards */
  .hof-ahead-reason {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed rgba(245,158,11,0.3);
    font-family: var(--font2);
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--amber-text, #92400e);
    line-height: 1.3;
    font-style: italic;
  }

  .hof-find-pill {
    position: absolute;
    top: 8px; right: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }
  .hof-find-body { padding: 10px 12px 12px; }
  .hof-find-name {
    font-family: var(--font2);
    font-size: 0.82rem; font-weight: 800;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hof-find-meta {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hof-find-stat {
    font-family: var(--font1);
    font-size: 1rem;
    color: var(--green-dark);
  }
  .hof-find-stat-sub {
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .hof-tier-empty {
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    padding: 16px 0;
    text-align: center;
    font-style: italic;
  }

  /* ══════════════════════════════════════════════════════════════
     MOMENT OF THE SEASON
     ══════════════════════════════════════════════════════════════ */
  .hof-moment {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 240px;
    background:
      linear-gradient(180deg, rgba(0,37,77,0.1) 0%, rgba(0,37,77,0.7) 100%),
      var(--green-pale) center/cover no-repeat;
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    display: flex;
    align-items: flex-end;
    border: 1.5px solid var(--border);
    transition: all 0.15s;
  }
  .hof-moment:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px var(--green-shadow);
  }
  .hof-moment-ini {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font1);
    font-size: 5rem;
    color: rgba(255,255,255,0.3);
  }
  .hof-moment-body {
    position: relative;
    z-index: 2;
    padding: 22px 24px;
    width: 100%;
  }
  .hof-moment-label {
    font-family: var(--font2);
    font-size: 0.58rem;
    font-weight: 900;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 6px;
  }
  .hof-moment-name {
    font-family: var(--font1);
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  .hof-moment-meta {
    font-family: var(--font2);
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .hof-moment-stat {
    font-family: var(--font1);
    color: var(--green-light);
  }

  /* ══════════════════════════════════════════════════════════════
     RECENT ADMITS STRIP
     ══════════════════════════════════════════════════════════════ */
  .hof-recent {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 2px 2px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .hof-recent::-webkit-scrollbar { height: 4px; }
  .hof-recent::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
  .hof-recent-item {
    flex: 0 0 auto;
    min-width: 140px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
  }
  .hof-recent-item:hover {
    border-color: var(--green-mid);
    transform: translateY(-1px);
  }
  .hof-recent-ava {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--green-pale) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .hof-recent-ini {
    font-family: var(--font1);
    font-size: 0.8rem;
    color: var(--green-dark);
  }
  .hof-recent-body { min-width: 0; }
  .hof-recent-name {
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }
  .hof-recent-date {
    font-family: var(--font2);
    font-size: 0.58rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ══════════════════════════════════════════════════════════════
     DISTRICTS + TIER DONUT
     ══════════════════════════════════════════════════════════════ */
  .hof-districts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
    gap: 6px;
  }
  .hof-district-tile {
    background: var(--green-pale);
    border: 1.5px solid var(--green-mid);
    border-radius: var(--radius-sm);
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .hof-district-tile:hover,
  .hof-district-tile.highlight {
    background: var(--white);
    border-color: var(--green);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--green-shadow);
  }
  .hof-district-tile .d-count {
    font-family: var(--font1);
    font-size: 1.2rem;
    color: var(--green-dark);
    line-height: 1;
    margin-bottom: 2px;
  }
  .hof-district-tile .d-name {
    font-family: var(--font2);
    font-size: 0.58rem;
    font-weight: 800;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hof-district-tile.heavy::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
  }
  .hof-rank-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    transition: all 0.15s;
  }
  .hof-rank-row.highlight {
    background: var(--green-pale);
    transform: translateX(3px);
  }
  .hof-rank-row .r-name {
    font-family: var(--font2);
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--text);
  }
  .hof-rank-row .r-count {
    font-family: var(--font1);
    font-size: 0.9rem;
    color: var(--green-dark);
  }

  .hof-donut {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1.5px solid var(--border);
  }
  .hof-donut-svg {
    width: 120px;
    height: 120px;
    position: relative;
  }
  .hof-donut circle { fill: none; stroke-width: 16; }
  .hof-donut .track { stroke: var(--bg); }
  .hof-donut .seg {
    stroke-dasharray: 314;
    stroke-dashoffset: 314;
    animation: hofDrawArc 1s cubic-bezier(0.4,0,0.2,1) forwards;
    transform: rotate(-90deg);
    transform-origin: center;
  }
  .hof-donut-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hof-donut-total {
    font-family: var(--font1);
    font-size: 1.4rem;
    color: var(--text);
    line-height: 1;
  }
  .hof-donut-lbl {
    font-family: var(--font2);
    font-size: 0.52rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .hof-donut-legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 10px;
    margin-top: 12px;
    width: 100%;
  }
  .hof-donut-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font2);
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--muted);
  }
  .hof-donut-legend-swatch {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .hof-donut-legend-item strong {
    color: var(--text);
    font-weight: 900;
    margin-left: auto;
  }

  /* ══════════════════════════════════════════════════════════════
     VELOCITY CHART
     ══════════════════════════════════════════════════════════════ */
  .hof-chart-wrap {
    position: relative;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1.5px solid var(--border);
  }
  .hof-chart {
    width: 100%;
    height: 180px;
    display: block;
    overflow: visible;
  }
  .hof-chart-line {
    fill: none;
    stroke: var(--green);
    stroke-width: 2.5;
    stroke-linejoin: round;
    stroke-linecap: round;
    stroke-dasharray: 1400;
    stroke-dashoffset: 1400;
    animation: hofDrawLine 1.4s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
  }
  .hof-chart-area {
    fill: url(#hofVeloArea);
    opacity: 0;
    animation: hofFadeUp 0.8s ease 1.2s forwards;
  }
  .hof-chart-dot {
    fill: var(--green-dark);
    opacity: 0;
    animation: hofFadeUp 0.3s ease forwards;
    cursor: pointer;
    transition: r 0.15s;
  }
  .hof-chart-dot:hover { r: 5.5; }
  .hof-tooltip {
    position: fixed;
    background: var(--dark);
    color: #fff;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    font-family: var(--font2);
    font-size: 0.68rem; font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    transform: translate(-50%, -100%);
    z-index: 20;
    white-space: nowrap;
  }
  .hof-tooltip.show { opacity: 1; }
  .hof-tooltip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--dark);
  }
  .hof-chart-stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .hof-chart-stat .n {
    font-family: var(--font1);
    font-size: 1.3rem;
    color: var(--green-dark);
    line-height: 1;
  }
  .hof-chart-stat .l {
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  /* ══════════════════════════════════════════════════════════════
     MONTHLY RHYTHM BARS
     ══════════════════════════════════════════════════════════════ */
  .hof-rhythm {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 6px;
    padding: 8px 4px 4px;
    align-items: end;
    height: 110px;
  }
  .hof-rhythm-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    height: 100%;
  }
  .hof-rhythm-col {
    width: 100%;
    background: var(--green);
    border-radius: 4px 4px 0 0;
    transform: scaleY(0);
    transform-origin: bottom;
    animation: hofGrowBar 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
    min-height: 2px;
    position: relative;
  }
  .hof-rhythm-col.quiet { background: var(--green-pale); border: 1px solid var(--green-mid); }
  .hof-rhythm-col:hover { opacity: 0.8; }
  .hof-rhythm-col::before {
    content: attr(data-count);
    position: absolute;
    top: -18px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--font1);
    font-size: 0.7rem;
    color: var(--green-dark);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .hof-rhythm-bar:hover .hof-rhythm-col::before { opacity: 1; }
  .hof-rhythm-label {
    font-family: var(--font2);
    font-size: 0.52rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ══════════════════════════════════════════════════════════════
     SEASON GOALS
     ══════════════════════════════════════════════════════════════ */
  .hof-goal {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: all 0.15s;
  }
  .hof-goal:hover {
    border-color: var(--green-mid);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--green-shadow);
  }
  .hof-goal.done {
    background: var(--green-pale);
    border-color: var(--green-mid);
  }
  .hof-goal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .hof-goal-title {
    font-family: var(--font2);
    font-size: 0.78rem; font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }
  .hof-goal-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .hof-goal-progress {
    font-family: var(--font1);
    font-size: 0.8rem;
    color: var(--green-dark);
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════════════
     HOME VISITS + STREAK
     ══════════════════════════════════════════════════════════════ */
  .hof-hv-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .hof-hv {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
  }
  .hof-hv .n {
    font-family: var(--font1);
    font-size: 1.5rem;
    line-height: 1;
    margin-bottom: 3px;
  }
  .hof-hv.done .n { color: var(--green-dark); }
  .hof-hv.pending .n { color: var(--amber); }
  .hof-hv.overdue .n { color: var(--red); }
  .hof-hv .l {
    font-family: var(--font2);
    font-size: 0.6rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .hof-streak {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--amber-pale), rgba(245,158,11,0.08));
    border: 1.5px solid rgba(245,158,11,0.3);
    border-radius: var(--radius);
  }
  .hof-streak-emoji { font-size: 1.8rem; flex-shrink: 0; }
  .hof-streak-body { flex: 1; min-width: 0; }
  .hof-streak-n {
    font-family: var(--font1);
    font-size: 1.2rem;
    color: var(--amber-text);
    line-height: 1.1;
  }
  .hof-streak-l {
    font-family: var(--font2);
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ══════════════════════════════════════════════════════════════
     PERSONAL RECORDS
     ══════════════════════════════════════════════════════════════ */
  .hof-record {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--green);
    cursor: pointer;
    transition: all 0.15s;
    gap: 10px;
  }
  .hof-record:hover {
    border-color: var(--green-mid);
    border-left-color: var(--green-dark);
    transform: translateX(2px);
    box-shadow: 0 3px 10px var(--green-shadow);
  }
  .hof-record-label {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .hof-record-val { text-align: right; min-width: 0; }
  .hof-record-val .v {
    font-family: var(--font1);
    font-size: 0.95rem;
    color: var(--green-dark);
    line-height: 1.1;
  }
  .hof-record-val .sub {
    display: block;
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 700;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ══════════════════════════════════════════════════════════════
     WRAP-UP + SHARE
     ══════════════════════════════════════════════════════════════ */
  .hof-wrap { padding: 22px 24px; }
  .hof-wrap-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hof-wrap-label {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 900;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .hof-wrap-text {
    font-family: var(--font2);
    font-size: 0.95rem; font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }
  .hof-wrap-text strong { color: var(--green-dark); font-weight: 900; }
  .hof-wrap-text em     { color: var(--accent); font-style: normal; font-weight: 900; }

  /* ══════════════════════════════════════════════════════════════
     QUOTE
     ══════════════════════════════════════════════════════════════ */
  .hof-quote {
    text-align: center;
    padding: 20px 24px 10px;
    font-family: var(--font2);
    color: var(--muted);
    font-style: italic;
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.5;
  }
  .hof-quote-author {
    display: block;
    margin-top: 6px;
    font-style: normal;
    font-size: 0.68rem;
    font-weight: 800;
    color: var(--green-dark);
    letter-spacing: 0.04em;
  }

  .hof-sub {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .hof-loading {
    padding: 60px 20px;
    text-align: center;
    font-family: var(--font2);
    font-weight: 700;
    color: var(--muted);
  }

  /* ══════════════════════════════════════════════════════════════
     LIGHTBOX
     ══════════════════════════════════════════════════════════════ */
  .hof-lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .hof-lightbox.open { display: flex; }
  .hof-lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    object-fit: contain;
  }

  /* Avatar menu popup */
  .hof-avatar-actions {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    z-index: 30;
    padding: 4px;
    min-width: 140px;
    display: none;
  }
  .hof-avatar-actions.show { display: block; }
  .hof-avatar-action {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 10px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text);
    text-align: left;
    border-radius: var(--radius-xs);
    transition: background 0.15s;
  }
  .hof-avatar-action:hover { background: var(--bg); }
  .hof-avatar-action.danger:hover { background: var(--red-pale); color: var(--red); }
  .hof-avatar-action svg {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════════════
     BADGE COLLECTION
     ══════════════════════════════════════════════════════════════ */
  @keyframes hofBadgePop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes hofBadgeGlow {
    0%, 100% { box-shadow: 0 2px 8px var(--green-shadow); }
    50%      { box-shadow: 0 4px 16px rgba(0,90,156,0.45); }
  }

  .hof-badges-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .hof-badges-count {
    font-family: var(--font1);
    font-size: 0.95rem;
    color: var(--green-dark);
  }
  .hof-badges-count strong { color: var(--text); }
  .hof-badges-toggle {
    font-family: var(--font2);
    font-size: 0.68rem;
    font-weight: 800;
    color: var(--green);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .hof-badges-toggle:hover { color: var(--green-dark); }
  .hof-badges-toggle svg {
    width: 10px; height: 10px;
    stroke: currentColor; fill: none;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.2s;
  }
  .hof-badges-toggle.open svg { transform: rotate(180deg); }

  .hof-badges-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 10px;
  }
  .hof-badge {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 8px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .hof-badge:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,37,77,0.08);
  }
  .hof-badge.earned {
    background: var(--green-pale);
    border-color: var(--green-mid);
  }
  .hof-badge.earned:hover {
    border-color: var(--green);
    box-shadow: 0 6px 16px var(--green-shadow);
  }
  .hof-badge.locked { opacity: 0.45; }
  .hof-badge.locked .hof-badge-icon { filter: grayscale(1); }
  .hof-badge.new {
    animation: hofBadgePop 0.5s cubic-bezier(0.4,0,0.2,1) forwards,
               hofBadgeGlow 2s ease-in-out 0.5s 2;
  }
  .hof-badge-icon {
    font-size: 1.9rem;
    line-height: 1;
    margin-bottom: 5px;
    display: block;
  }
  .hof-badge-name {
    font-family: var(--font2);
    font-size: 0.62rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    word-wrap: break-word;
    hyphens: auto;
  }
  .hof-badge.earned .hof-badge-name { color: var(--green-dark); }

  .hof-badge-tip {
    position: fixed;
    background: var(--dark);
    color: #fff;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--font2);
    font-size: 0.72rem;
    font-weight: 700;
    line-height: 1.35;
    max-width: 240px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 50;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .hof-badge-tip.show { opacity: 1; }
  .hof-badge-tip-name {
    font-family: var(--font1);
    font-size: 0.85rem;
    color: var(--green-light);
    margin-bottom: 3px;
  }
  .hof-badge-tip-desc {
    font-family: var(--font2);
    font-size: 0.7rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }
  .hof-badge-tip-status {
    margin-top: 6px;
    font-size: 0.58rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .hof-badge-tip-status.earned { color: var(--green-light); }
  .hof-badge-tip-status.locked { color: rgba(255,255,255,0.45); }

  /* Mobile tightening */
  @media (max-width: 768px) {
    .hof-find { flex-basis: 160px; }
    .hof-wrap { padding: 18px 16px; }
    .hof-wrap-text { font-size: 0.88rem; }
    .hof-chart-stats { gap: 16px; }
    .hof-banner { padding: 20px 18px; }
    .hof-banner-name { font-size: 1.3rem; }
    .hof-avatar-wrap, .hof-avatar { width: 72px; height: 72px; }
    .hof-avatar-ini { font-size: 1.5rem; }
    .hof-hv-row { grid-template-columns: 1fr 1fr 1fr; }
    .hof-rhythm { gap: 3px; height: 90px; }
    .hof-badges-grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 8px; }
    .hof-badge { padding: 10px 6px 8px; }
    .hof-badge-icon { font-size: 1.6rem; }
    .hof-badge-name { font-size: 0.56rem; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Hall of Fame</div>

// HALL OF FAME — Tier 1 + Tier 2

// localStorage keys (namespaced per user so multiple scouts don't collide)

// ── HELPERS ─────────────────────────────────────────────────────
function toArray(res) {
  if (Array.isArray(res)) return res;
  if (!res || typeof res !== 'object') return [];
  if (Array.isArray(res.players)) return res.players;
  if (Array.isArray(res.batches)) return res.batches;
  if (Array.isArray(res.data))    return res.data;
  if (Array.isArray(res.rows))    return res.rows;
  for (const k of Object.keys(res)) {
    if (Array.isArray(res[k])) return res[k];
  }
  return [];
}
function num(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}
function age(dob) {
  if (!dob) return null;
  const b = new Date(dob);
  if (isNaN(b.getTime())) return null;
  return (Date.now() - b.getTime()) / (365.25 * 24 * 60 * 60 * 1000);
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '';
  return dt.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
}
function fmtDay(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '';
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function initials(name) {
  return (name||'').split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase();
}
function bestVelo(p)   { return num(p.dev_velo)       ?? num(p.velo); }
function bestWeight(p) { return num(p.dev_weight_lbs) ?? num(p.weight_lbs); }
function bestHeight(p) { return p.dev_height_ft || p.height_ft || p.init_height_ft; }
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getSeasonOf(p) {
  if (!p.created_at) return null;
  const d = new Date(p.created_at);
  return isNaN(d.getTime()) ? null : d.getFullYear();
}
function inSeason(p, year) {
  const s = getSeasonOf(p);
  return s !== null && s === year;
}

// ── Velocity tier — ABSOLUTE threshold, no age adjustment ──────
// Elite is the only absolute tier: 92+ mph. Below that, players are
// surfaced via the "Ahead of his age" signal instead. Strong/Solid
// were dropped because they overlapped heavily with Ahead-of-age.
function classifyVelo(p) {
  const v = bestVelo(p);
  if (v === null) return null;
  if (v >= 92) return 'ELITE';
  return null;
}

// ── Ahead of his age — separate signal ──────────────────────────
// 5+ mph above the age baseline. Independent from velocity tier — a kid
// can be both "Strong" AND "Ahead of his age", or just one, or neither.
const AGE_BASELINES = [
  { maxAge: 10, baseline: 45 },
  { maxAge: 12, baseline: 52 },
  { maxAge: 14, baseline: 60 },
  { maxAge: 16, baseline: 68 },
  { maxAge: 18, baseline: 74 },
  { maxAge: 99, baseline: 78 },
];
function isAheadOfAge(p) {
  const v = bestVelo(p);
  const a = age(p.dob);
  if (v === null || a === null) return false;
  let base = 60;
  for (const t of AGE_BASELINES) { if (a <= t.maxAge) { base = t.baseline; break; } }
  return (v - base) >= 5;
}

// Compute WHY a player is ahead of his age. Returns:
//   { mphOverBaseline, ageOf, ageEquivalent, scoutLine, statLine }
// scoutLine = human framing ("Throws like a 16yo")
// statLine  = analytical framing ("+13 mph over age 13 baseline")
// ageEquivalent = the higher age bracket this kid's velocity matches
function aheadOfAgeReason(p) {
  const v = bestVelo(p);
  const a = age(p.dob);
  if (v === null || a === null) return null;
  let base = 60;
  for (const t of AGE_BASELINES) { if (a <= t.maxAge) { base = t.baseline; break; } }
  const delta = v - base;
  if (delta < 5) return null;

  // "Throws like a Xyo" — find the highest age bracket whose baseline this kid's velo meets/exceeds
  // Walk through baselines and find the highest maxAge whose baseline <= v
  let ageEquivalent = null;
  for (const t of AGE_BASELINES) {
    if (v >= t.baseline) ageEquivalent = t.maxAge;
  }
  // Cap the display: if ageEquivalent is 99 (the catch-all bracket), say "adult"
  const ageOfDisplay = Math.floor(a);
  let scoutLine;
  if (ageEquivalent === null || ageEquivalent <= ageOfDisplay) {
    // Edge case: somehow above age but not above next bracket. Fall back to mph-over.
    scoutLine = `+${Math.round(delta)} mph over age ${ageOfDisplay} baseline`;
  } else if (ageEquivalent >= 99) {
    scoutLine = `Throws like an adult · age ${ageOfDisplay}`;
  } else {
    scoutLine = `Throws like a ${ageEquivalent}-year-old · age ${ageOfDisplay}`;
  }

  return {
    mphOverBaseline: Math.round(delta),
    ageOf: ageOfDisplay,
    baseline: base,
    ageEquivalent,
    scoutLine,
    statLine: `${v} mph · +${Math.round(delta)} over age ${ageOfDisplay} baseline (${base})`,
  };
}

// Backwards-compat shim — anything still calling classifyRarity() gets mapped to the new tier
function classifyRarity(p) { return classifyVelo(p); }

function countUp(el, target, duration) {
  duration = duration || 900;
  const start = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(target * eased);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = target;
  }
  requestAnimationFrame(tick);
}

// Greeting based on hour
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return { text: 'Good morning', emoji: '☀️' };
  if (h < 17) return { text: 'Good afternoon', emoji: '👋' };
  if (h < 21) return { text: 'Good evening', emoji: '🌆' };
  return { text: 'Working late', emoji: '🌙' };
}

function todayFormatted() {
  return new Date().toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

// ── HERO METRICS (season-filtered) ──────────────────────────────
function renderMetrics(players, batches) {

// ── ON THIS DAY ─────────────────────────────────────────────────
function renderOnThisDay(players) {
  const today = new Date();
  const todayMD = today.getMonth()*100 + today.getDate();

  // Find the earliest player matching today's month/day in any prior year
  let memory = null;
  for (const p of players) {
    if (!p.created_at) continue;
    const d = new Date(p.created_at);
    if (isNaN(d.getTime())) continue;
    if (d.getFullYear() >= today.getFullYear()) continue;
    if (d.getMonth()*100 + d.getDate() !== todayMD) continue;
    if (!memory || d < memory.d) memory = { d, p };
  }
  if (!memory) return '';

  const yearsAgo = today.getFullYear() - memory.d.getFullYear();
  const label = yearsAgo === 1 ? 'a year ago today' : yearsAgo + ' years ago today';
  const velo = bestVelo(memory.p);
  const stats = [];
  if (memory.p.district) stats.push(escapeHtml(memory.p.district));
  if (velo) stats.push(velo + ' mph');

  return `
    <div class="hof-sec d3" style="margin-bottom:14px">
      <a class="hof-otd" href="profile.html?id=${encodeURIComponent(memory.p.id)}">
        <div class="hof-otd-icon">🗓</div>
        <div class="hof-otd-body">
          <div class="hof-otd-label">On this day</div>
          <div class="hof-otd-text">
            You admitted <strong>${escapeHtml(memory.p.name||'Unknown')}</strong>
            ${label}${stats.length ? ' · ' + stats.join(' · ') : ''}
          </div>
        </div>
        <div class="hof-otd-arrow">→</div>
      </a>
    </div>
  `;
}

// ── ACHIEVEMENTS (white-hat milestones) ─────────────────────────
function computeAchievements(players, batches) {
  const achievements = [];
  const seasonPlayers = players.filter(p => inSeason(p, viewSeason));
  const admitted = seasonPlayers.filter(p => p.outcome === 'admitted');

  // 1. Round-number admits (10, 25, 50, 100)
  const admittedLifetime = players.filter(p => p.outcome === 'admitted').length;
  [10, 25, 50, 100, 250, 500].forEach(milestone => {
    if (admittedLifetime >= milestone) {
      achievements.push({
        id: 'admits_' + milestone,
        emoji: '🎯',
        title: milestone + ' players admitted to the program',
        sub: 'Career milestone · ' + admittedLifetime + ' total',
      });
    }
  });

  // 2. Round-number total players (50, 100, 250)
  [50, 100, 250, 500].forEach(milestone => {
    if (players.length >= milestone) {
      achievements.push({
        id: 'total_' + milestone,
        emoji: '⭐',
        title: milestone + ' players scouted overall',
        sub: 'Across all seasons',
      });
    }
  });

  // 3. Districts milestones
  const districts = new Set(players.map(p => p.district).filter(Boolean));
  [5, 10, 20, 30].forEach(milestone => {
    if (districts.size >= milestone) {
      achievements.push({
        id: 'districts_' + milestone,
        emoji: '🗺️',
        title: 'Scouted across ' + milestone + ' districts',
        sub: 'Territory: ' + districts.size + ' districts total',
      });
    }
  });

  // 4. Fast start this season
  const daysIntoSeason = Math.ceil((Date.now() - new Date(viewSeason, 0, 1).getTime()) / (1000*60*60*24));
  if (seasonPlayers.length >= 10 && daysIntoSeason <= 60) {
    achievements.push({
      id: 'fast_start_' + viewSeason,
      emoji: '🚀',
      title: 'Fast start: ' + seasonPlayers.length + ' players in first ' + daysIntoSeason + ' days',
      sub: viewSeason + ' season · strong opener',
    });
  }

  // 5. Elite finds
  const tiers = players.map(classifyVelo).filter(Boolean);
  const eliteCount = tiers.filter(r => r === 'ELITE').length;
  if (eliteCount >= 1) {
    achievements.push({
      id: 'first_elite',
      emoji: '💎',
      title: eliteCount === 1 ? 'First Elite-velocity discovery' : eliteCount + ' Elite-velocity players in your pipeline',
      sub: '92+ mph · scout-grade arm',
    });
  }
  if (eliteCount >= 5) {
    achievements.push({
      id: 'elite_5',
      emoji: '🔥',
      title: '5+ Elite players discovered',
      sub: 'Remarkable scouting eye',
    });
  }

  // 6. Ahead-of-age finds
  const aheadCount = players.filter(isAheadOfAge).length;
  if (aheadCount >= 1) {
    achievements.push({
      id: 'first_ahead_of_age',
      emoji: '🌱',
      title: aheadCount === 1
        ? 'First "Ahead of his age" player spotted'
        : aheadCount + ' players ahead of their age',
      sub: 'Eye for projection',
    });
  }

  // 6. Recent burst (5+ in last 14 days, season only)
  const cutoff = Date.now() - 14 * 86400000;
  const recentBurst = seasonPlayers.filter(p => {
    const d = p.created_at ? new Date(p.created_at).getTime() : 0;
    return d >= cutoff;
  }).length;
  if (recentBurst >= 5) {
    achievements.push({
      id: 'burst_' + Math.floor(Date.now()/86400000/7),  // Weekly dedupe
      emoji: '📈',
      title: recentBurst + ' players added in the last 2 weeks',
      sub: 'You are on a roll',
    });
  }

  // Filter dismissed
  let dismissed = [];
  try { dismissed = JSON.parse(localStorage.getItem(LS_DISMISSED_ACH) || '[]'); } catch(e) {}
  const visible = achievements.filter(a => !dismissed.includes(a.id));

  // Show at most 2 at a time
  return visible.slice(0, 2);
}

function renderAchievements(players, batches) {
  const items = computeAchievements(players, batches);
  if (items.length === 0) return '';
  return `
    <div class="hof-sec d4" style="margin-bottom:14px">
      <div style="display:flex;flex-direction:column;gap:8px">
        ${items.map(a => `
          <div class="hof-achieve">
            <div class="hof-achieve-emoji">${a.emoji}</div>
            <div class="hof-achieve-body">
              <div class="hof-achieve-title">${escapeHtml(a.title)}</div>
              <div class="hof-achieve-sub">${escapeHtml(a.sub)}</div>
            </div>
            <button class="hof-achieve-dismiss" onclick="dismissAchievement('${a.id}')" title="Dismiss">×</button>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Badge rule engine ──────────────────────────────────────────
// Takes the full players array + batches + derived stats. Returns set of badge ids.
function computeEarnedBadges(players, batches) {
  const earned = new Set();
  if (!players || players.length === 0) return earned;

  const admitted = players.filter(p => p.outcome === 'admitted');
  const districts = new Set(players.map(p => p.district).filter(Boolean));
  const divisions = new Set(players.map(p => p.division).filter(Boolean));
  const schools   = new Set(players.map(p => p.school).filter(Boolean));
  const classes   = new Set(players.map(p => p.class).filter(Boolean));

  // ── Volume ──
  if (players.length >= 1)         earned.add('first_find');
  if (admitted.length >= 1)        earned.add('first_admit');
  if (admitted.length >= 10)       earned.add('admits_10');
  if (admitted.length >= 25)       earned.add('admits_25');
  if (admitted.length >= 50)       earned.add('admits_50');
  if (admitted.length >= 100)      earned.add('admits_100');
  if (admitted.length >= 250)      earned.add('admits_250');
  if (admitted.length >= 500)      earned.add('admits_500');

  // ── Territory ──
  if (districts.size >= 1)         earned.add('first_district');
  if (districts.size >= 5)         earned.add('districts_5');
  if (districts.size >= 10)        earned.add('districts_10');
  if (districts.size >= 20)        earned.add('districts_20');
  if (divisions.size >= 4)         earned.add('all_regions');

  // ── Rarity & tiers (absolute velocity) ──
  const tiers = players.map(classifyVelo).filter(Boolean);
  const eliteN = tiers.filter(r => r === 'ELITE').length;
  if (eliteN >= 1)                 earned.add('first_elite');
  if (eliteN >= 5)                 earned.add('elite_5');
  if (eliteN >= 10)                earned.add('elite_10');

  // Eye for Projection — first ahead-of-age player
  if (players.some(isAheadOfAge))  earned.add('eye_projection');

  const t1s = admitted.filter(p => String(p.tier) === '1').length;
  if (t1s >= 1)                    earned.add('first_t1');
  if (t1s >= 10)                   earned.add('t1_10');

  // Velocity 80+
  const velo80 = players.some(p => {
    const v = bestVelo(p);
    return v !== null && v >= 80;
  });
  if (velo80)                      earned.add('velo_80');

  // Tall order: projected adult height >= 6'4" via dev_height_ft or height_ft
  const tallOrder = players.some(p => {
    const h = bestHeight(p);
    if (!h) return false;
    const m = String(h).match(/^(\d+)'(\d+(?:\.\d+)?)/);
    if (!m) return false;
    const totalIn = parseInt(m[1])*12 + parseFloat(m[2]);
    return totalIn >= 76; // 6'4"
  });
  if (tallOrder)                   earned.add('tall_order');

  // ── Operations / Tryouts ──
  if (batches.length >= 1)         earned.add('first_batch');
  if (batches.length >= 10)        earned.add('batches_10');
  if (batches.length >= 25)        earned.add('batches_25');

  // Hat trick: 3+ batches in current/any single season
  const batchesBySeason = {};
  batches.forEach(b => {
    const y = b.start_date ? new Date(b.start_date).getFullYear() :
              b.created_at ? new Date(b.created_at).getFullYear() : null;
    if (y) batchesBySeason[y] = (batchesBySeason[y]||0) + 1;
  });
  if (Object.values(batchesBySeason).some(n => n >= 3)) earned.add('hat_trick');

  // Big batch: 10+ players in one batch_id
  const playersByBatch = {};
  players.forEach(p => {
    if (p.batch_id) playersByBatch[p.batch_id] = (playersByBatch[p.batch_id]||0) + 1;
  });
  if (Object.values(playersByBatch).some(n => n >= 10)) earned.add('big_batch');

  // ── Home visits ──
  const visitedPlayers = admitted.filter(p =>
    p.home_visit_at || p.home_visit_date || p.home_visit_completed || p.visited_home
  );
  if (visitedPlayers.length >= 1)  earned.add('first_visit');
  if (visitedPlayers.length >= 10) earned.add('visits_10');

  const t1Players = admitted.filter(p => String(p.tier) === '1');
  if (t1Players.length >= 1 && t1Players.every(p =>
    p.home_visit_at || p.home_visit_date || p.home_visit_completed || p.visited_home
  )) earned.add('t1_visits');

  // ── Data craft ──
  const hasDevMetrics = p =>
    (num(p.dev_velo) !== null || num(p.dev_weight_lbs) !== null || p.dev_height_ft || num(p.dev_kr) !== null);
  const devCount = players.filter(hasDevMetrics).length;
  if (devCount >= 10)              earned.add('data_10');
  if (devCount >= 50)              earned.add('dev_50');

  const krCount = players.filter(p => num(p.kr) !== null || num(p.dev_kr) !== null).length;
  if (krCount >= 25)               earned.add('kr_25');

  // Photos on all T1
  if (t1Players.length >= 1 && t1Players.every(p => p.photo_url))
    earned.add('photos_t1');

  // Storyteller: 20+ players with substantial notes
  const storied = players.filter(p => {
    const n = (p.notes || '') + ' ' + (p.init_notes || '') + ' ' + (p.dev_notes || '');
    return n.trim().length >= 40;
  }).length;
  if (storied >= 20)               earned.add('storyteller');

  // ── Cadence — consecutive months with admits ──
  const admitDates = admitted.map(p => p.created_at ? new Date(p.created_at) : null).filter(d => d && !isNaN(d.getTime()));
  let maxStreak = 0;
  if (admitDates.length > 0) {
    // Build set of "YYYY-MM" keys with at least one admit
    const monthsWithAdmits = new Set();
    admitDates.forEach(d => {
      monthsWithAdmits.add(d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0'));
    });
    // Walk backward from current month, counting consecutive
    const now = new Date();
    let curY = now.getFullYear(), curM = now.getMonth();
    let streak = 0;
    for (let i = 0; i < 60; i++) {
      const key = curY + '-' + String(curM).padStart(2,'0');
      if (monthsWithAdmits.has(key)) streak++;
      else if (streak > 0) break;
      // Decrement month
      curM--; if (curM < 0) { curM = 11; curY--; }
    }
    maxStreak = streak;
  }
  if (maxStreak >= 3)              earned.add('streak_3');
  if (maxStreak >= 6)              earned.add('streak_6');
  if (maxStreak >= 12)             earned.add('streak_12');

  // Fast start: 10+ admits within first 60 days of any season
  const admitsBySeasonEarly = {};
  admitted.forEach(p => {
    if (!p.created_at) return;
    const d = new Date(p.created_at);
    if (isNaN(d.getTime())) return;
    const seasonStart = new Date(d.getFullYear(), 0, 1).getTime();
    const days = (d.getTime() - seasonStart) / 86400000;
    if (days <= 60) {
      admitsBySeasonEarly[d.getFullYear()] = (admitsBySeasonEarly[d.getFullYear()]||0) + 1;
    }
  });
  if (Object.values(admitsBySeasonEarly).some(n => n >= 10)) earned.add('fast_start');

  // ── Season highlights ──
  // Season opener: an admit in January of any season year
  if (admitted.some(p => {
    if (!p.created_at) return false;
    const d = new Date(p.created_at);
    return !isNaN(d.getTime()) && d.getMonth() === 0;
  })) earned.add('season_opener');

  // Season MVP: any season with 50+ admits
  const admitsBySeason = {};
  admitted.forEach(p => {
    const s = getSeasonOf(p);
    if (s) admitsBySeason[s] = (admitsBySeason[s]||0) + 1;
  });
  if (Object.values(admitsBySeason).some(n => n >= 50)) earned.add('season_mvp');

  // Hot week: 5+ admits in any single 7-day window
  if (admitDates.length >= 5) {
    const ts = admitDates.map(d => d.getTime()).sort((a,b) => a-b);
    for (let i = 0; i <= ts.length - 5; i++) {
      if (ts[i+4] - ts[i] <= 7 * 86400000) { earned.add('hot_week'); break; }
    }
  }

  // Hot month: 15+ admits in any single calendar month
  const admitsByMonth = {};
  admitDates.forEach(d => {
    const key = d.getFullYear() + '-' + d.getMonth();
    admitsByMonth[key] = (admitsByMonth[key]||0) + 1;
  });
  if (Object.values(admitsByMonth).some(n => n >= 15)) earned.add('hot_month');

  // ── Diversity & reach ──
  if (schools.size >= 5)           earned.add('schools_5');
  if (schools.size >= 10)          earned.add('schools_10');
  if (classes.size >= 4)           earned.add('ages_4');

  // ── Pipeline depth ──
  const activePipeline = players.filter(p => p.outcome !== 'eliminated').length;
  if (activePipeline >= 30)        earned.add('deep_bench');

  // Self-made: tier improvement (init tier 3 → current tier 1)
  // We don't track tier history, so use a proxy: admitted player whose init_notes
  // or dev_notes mention tier movement. If we can't detect this reliably, leave locked.
  // Simpler check: any admitted player whose dev_velo significantly exceeds velo (+10mph)
  if (admitted.some(p => {
    const iv = num(p.velo), dv = num(p.dev_velo);
    return iv !== null && dv !== null && (dv - iv) >= 10;
  })) earned.add('self_made');

  // ── Tenure & loyalty ──
  // Day One: player record with created_at <= 2019
  if (players.some(p => {
    if (!p.created_at) return false;
    const d = new Date(p.created_at);
    return !isNaN(d.getTime()) && d.getFullYear() <= 2019;
  })) earned.add('day_one');

  // ── Fun / flavor ──
  admitDates.forEach(d => {
    const h = d.getHours();
    if (h < 7)   earned.add('early_bird');
    if (h >= 22) earned.add('night_owl');
  });

  return earned;
}

function renderBadges(players, batches) {
  const earned = computeEarnedBadges(players, batches);
  const total = HOF_BADGES.length;
  const earnedCount = earned.size;

  // Detect newly earned (first render only)
  let previouslyEarned = [];
  try { previouslyEarned = JSON.parse(localStorage.getItem(LS_EARNED_BADGES) || '[]'); } catch(e) {}
  const prevSet = new Set(previouslyEarned);
  const newlyEarned = [...earned].filter(id => !prevSet.has(id));
  // Persist current state so next visit doesn't re-animate
  localStorage.setItem(LS_EARNED_BADGES, JSON.stringify([...earned]));

  // Sort: earned first (by definition order), then locked (by definition order)
  const sorted = [
    ...HOF_BADGES.filter(b => earned.has(b.id)),
    ...HOF_BADGES.filter(b => !earned.has(b.id)),
  ];

  const tiles = sorted.map((b, i) => {
    const isEarned = earned.has(b.id);
    const isNew = newlyEarned.includes(b.id);
    const classes = [
      'hof-badge',
      isEarned ? 'earned' : 'locked',
      isNew ? 'new' : '',
    ].filter(Boolean).join(' ');
    const animDelay = isNew ? `style="animation-delay:${(0.1 + i*0.05).toFixed(2)}s"` : '';
    return `
      <div class="${classes}" ${animDelay}
           data-bid="${b.id}"
           data-name="${escapeHtml(b.name)}"
           data-desc="${escapeHtml(b.desc)}"
           data-earned="${isEarned ? '1' : '0'}">
        <span class="hof-badge-icon">${b.icon}</span>
        <div class="hof-badge-name">${escapeHtml(b.name)}</div>
      </div>`;
  }).join('');

  return `
    <div class="hof-sec d4 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Scout Badges</span>
        <button class="hof-badges-toggle" id="hofBadgesToggle" onclick="toggleBadges()">
          <span id="hofBadgesToggleLabel">Show locked (${total - earnedCount})</span>
          <svg viewBox="0 0 16 16"><path d="M3 6l5 5 5-5"/></svg>
        </button>
      </div>
      <div class="hof-badges-head">
        <div class="hof-badges-count">
          <strong>${earnedCount}</strong> of ${total} earned
        </div>
      </div>
      <div class="hof-badges-grid" id="hofBadgesGrid">${tiles}</div>
    </div>
  `;
}

function toggleBadges() {
  const grid = document.getElementById('hofBadgesGrid');
  const btn = document.getElementById('hofBadgesToggle');
  const lbl = document.getElementById('hofBadgesToggleLabel');
  if (!grid || !btn) return;
  const showing = btn.classList.toggle('open');
  const locked = grid.querySelectorAll('.hof-badge.locked');
  locked.forEach(el => { el.style.display = showing ? '' : 'none'; });
  if (lbl) {
    lbl.textContent = showing
      ? 'Hide locked'
      : `Show locked (${locked.length})`;
  }
}

function wireBadgeTooltips() {
  const grid = document.getElementById('hofBadgesGrid');
  const tip = document.getElementById('hofBadgeTip');
  if (!grid || !tip) return;

  function showTip(badgeEl) {
    const name = badgeEl.getAttribute('data-name');
    const desc = badgeEl.getAttribute('data-desc');
    const isEarned = badgeEl.getAttribute('data-earned') === '1';
    tip.innerHTML = `
      <div class="hof-badge-tip-name">${escapeHtml(name)}</div>
      <div class="hof-badge-tip-desc">${escapeHtml(desc)}</div>
      <div class="hof-badge-tip-status ${isEarned ? 'earned' : 'locked'}">
        ${isEarned ? '✓ Earned' : '🔒 Locked'}
      </div>`;
    const rect = badgeEl.getBoundingClientRect();
    // Position above the badge, clamped within viewport
    const tipRect = tip.getBoundingClientRect();
    let left = rect.left + rect.width/2;
    const top = rect.top - 10;
    tip.style.left = left + 'px';
    tip.style.top  = top + 'px';
    tip.style.transform = 'translate(-50%, -100%)';
    tip.classList.add('show');
  }
  function hideTip() { tip.classList.remove('show'); }

  grid.addEventListener('mouseover', e => {
    const b = e.target.closest('.hof-badge');
    if (b) showTip(b);
  });
  grid.addEventListener('mouseout', e => {
    const b = e.target.closest('.hof-badge');
    if (b) hideTip();
  });
  // Mobile: tap shows tooltip briefly
  grid.addEventListener('click', e => {
    const b = e.target.closest('.hof-badge');
    if (!b) return;
    showTip(b);
    setTimeout(hideTip, 2800);
  });
}

// Hide locked badges by default on initial render
function initBadgesCollapsed() {
  const grid = document.getElementById('hofBadgesGrid');
  if (!grid) return;
  grid.querySelectorAll('.hof-badge.locked').forEach(el => { el.style.display = 'none'; });
}

// ── TALENT TIERS ────────────────────────────────────────────────
// Two color-coded sections: Elite (absolute 92+ mph) and Ahead of his age
// (5+ mph above age baseline). Each section is independent — players can
// appear in both if they qualify for both, which signals exceptional talent.
// Sections with zero players don't render at all.

function renderTalentTiers(players) {
  const elite = [];
  const ahead = [];

  players.forEach(p => {
    const tier = classifyVelo(p);
    const v = bestVelo(p);
    if (tier === 'ELITE') elite.push({ p, v });
    if (isAheadOfAge(p))  ahead.push({ p, v, reason: aheadOfAgeReason(p) });
  });

  const sortAndCap = arr => arr.sort((a,b) => (b.v||0) - (a.v||0)).slice(0, 8);
  const eliteTop = sortAndCap(elite);
  const aheadTop = sortAndCap(ahead);

  // Combined empty state if both sections have nothing
  if (eliteTop.length === 0 && aheadTop.length === 0) {
    return `
      <div class="hof-sec d5 card" style="margin-bottom:14px">
        <div class="card-head"><span class="card-title">Talent Tiers</span></div>
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 16 16"><path d="M8 2l2 4 4 .5-3 3 1 4-4-2-4 2 1-4-3-3 4-.5z"/></svg>
          </div>
          <div class="empty-title">No tiered players yet</div>
          <div class="empty-sub">Add velocity readings and date-of-birth to see Elite and Ahead-of-Age finds.</div>
        </div>
      </div>`;
  }

  return [
    renderEliteSection(eliteTop),
    renderAheadSection(aheadTop),
  ].filter(Boolean).join('');
}

function renderEliteSection(items) {
  if (items.length === 0) return '';
  const cards = items.map(({ p, v }) => {
    const photo = p.photo_url
      ? `<div class="hof-find-photo" style="background-image:url('${escapeHtml(p.photo_url)}')"></div>`
      : `<div class="hof-find-photo"><div class="hof-find-ini">${initials(p.name)}</div></div>`;
    return `
      <a class="hof-find" href="profile.html?id=${encodeURIComponent(p.id)}">
        ${photo}
        <span class="pill pill-green hof-find-pill">${v} mph</span>
        <div class="hof-find-body">
          <div class="hof-find-name">${escapeHtml(p.name||'Unknown')}</div>
          <div class="hof-find-meta">${escapeHtml(p.district||'—')} · ${escapeHtml(p.class||'—')}</div>
          <div class="hof-find-stat">${v} <span class="hof-find-stat-sub">mph</span></div>
        </div>
      </a>
    `;
  }).join('');
  return `
    <div class="hof-sec d5 hof-tier elite">
      <div class="hof-tier-head">
        <div class="hof-tier-title-wrap">
          <div class="hof-tier-badge">💎</div>
          <div>
            <div class="hof-tier-title">Elite</div>
            <div class="hof-tier-rule">92+ mph · Scout-grade arm</div>
          </div>
        </div>
        <div class="hof-tier-count">${items.length}</div>
      </div>
      <div class="hof-reel">${cards}</div>
    </div>
  `;
}

function renderAheadSection(items) {
  if (items.length === 0) return '';
  const cards = items.map(({ p, v, reason }) => {
    const photo = p.photo_url
      ? `<div class="hof-find-photo" style="background-image:url('${escapeHtml(p.photo_url)}')"></div>`
      : `<div class="hof-find-photo"><div class="hof-find-ini">${initials(p.name)}</div></div>`;

    // The reason line below velocity — human framing always shown
    const reasonLine = reason
      ? `<div class="hof-ahead-reason">${escapeHtml(reason.scoutLine)}</div>`
      : '';

    // data-* attrs for hover tooltip (analytical detail)
    const tipData = reason
      ? `data-tip-name="${escapeHtml(p.name||'Unknown')}" data-tip-stat="${escapeHtml(reason.statLine)}"`
      : '';

    return `
      <a class="hof-find hof-find-ahead" href="profile.html?id=${encodeURIComponent(p.id)}" ${tipData}>
        ${photo}
        <span class="pill pill-amber hof-find-pill">🌱</span>
        <div class="hof-find-body">
          <div class="hof-find-name">${escapeHtml(p.name||'Unknown')}</div>
          <div class="hof-find-meta">${escapeHtml(p.district||'—')} · ${escapeHtml(p.class||'—')}</div>
          <div class="hof-find-stat">${v != null ? v : '—'} <span class="hof-find-stat-sub">mph</span></div>
          ${reasonLine}
        </div>
      </a>
    `;
  }).join('');
  return `
    <div class="hof-sec d6 hof-tier ahead" id="hofAheadSection">
      <div class="hof-tier-head">
        <div class="hof-tier-title-wrap">
          <div class="hof-tier-badge">🌱</div>
          <div>
            <div class="hof-tier-title">Ahead of his age</div>
            <div class="hof-tier-rule">5+ mph above age baseline · Future talent</div>
          </div>
        </div>
        <div class="hof-tier-count">${items.length}</div>
      </div>
      <div class="hof-reel">${cards}</div>
    </div>
  `;
}

function renderDiscoveryReel(players) { return renderTalentTiers(players); }

// ── MOMENT OF THE SEASON ────────────────────────────────────────
function renderMoment(players) {
  const seasonPlayers = players.filter(p => inSeason(p, viewSeason));
  const admitted = seasonPlayers.filter(p => p.outcome === 'admitted');
  let top = null;
  admitted.forEach(p => {
    const v = bestVelo(p);
    if (v !== null && (!top || v > top.v)) top = { v, p };
  });
  if (!top) return '';

  const bgStyle = top.p.photo_url
    ? `background: linear-gradient(180deg, rgba(0,37,77,0.1) 0%, rgba(0,37,77,0.75) 100%), url('${escapeHtml(top.p.photo_url)}') center/cover no-repeat;`
    : '';

  return `
    <div class="hof-sec d6" style="margin-bottom:14px">
      <a class="hof-moment" href="profile.html?id=${encodeURIComponent(top.p.id)}" style="${bgStyle}">
        ${!top.p.photo_url ? `<div class="hof-moment-ini">${initials(top.p.name)}</div>` : ''}
        <div class="hof-moment-body">
          <div class="hof-moment-label">Moment of the ${viewSeason} Season</div>
          <div class="hof-moment-name">${escapeHtml(top.p.name||'Unknown')}</div>
          <div class="hof-moment-meta">
            <span class="hof-moment-stat">${top.v} mph</span>
            <span>${escapeHtml(top.p.district||'—')}</span>
            <span>${escapeHtml(top.p.class||'—')}</span>
          </div>
        </div>
      </a>
    </div>
  `;
}

// ── RECENT ADMITS ───────────────────────────────────────────────
