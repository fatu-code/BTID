<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hall of Fame - BTID</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════════════════
     HALL OF FAME — uses global design system variables only.
     Local rules cover entry animations + reel/chart/tile specifics.
     ══════════════════════════════════════════════════════════════ */

  @keyframes hofFadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes hofSlideInRight {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes hofDrawLine { to { stroke-dashoffset: 0; } }

  .hof-sec {
    opacity: 0;
    animation: hofFadeUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  .hof-sec.d0 { animation-delay: 0.00s; }
  .hof-sec.d1 { animation-delay: 0.08s; }
  .hof-sec.d2 { animation-delay: 0.16s; }
  .hof-sec.d3 { animation-delay: 0.24s; }
  .hof-sec.d4 { animation-delay: 0.32s; }
  .hof-sec.d5 { animation-delay: 0.40s; }
  .hof-sec.d6 { animation-delay: 0.48s; }

  .metrics-grid.hof-cascade .metric-card {
    opacity: 0;
    animation: hofFadeUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  .metrics-grid.hof-cascade .metric-card:nth-child(1) { animation-delay: 0.10s; }
  .metrics-grid.hof-cascade .metric-card:nth-child(2) { animation-delay: 0.20s; }
  .metrics-grid.hof-cascade .metric-card:nth-child(3) { animation-delay: 0.30s; }

  /* Rare Finds reel */
  .hof-reel {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 2px 2px 8px 2px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    margin: 0 -2px;
  }
  .hof-reel::-webkit-scrollbar { height: 6px; }
  .hof-reel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
  .hof-reel::-webkit-scrollbar-track { background: transparent; }

  .hof-find {
    flex: 0 0 180px;
    scroll-snap-align: start;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
    opacity: 0;
    animation: hofSlideInRight 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    position: relative;
  }
  .hof-find:nth-child(1) { animation-delay: 0.20s; }
  .hof-find:nth-child(2) { animation-delay: 0.26s; }
  .hof-find:nth-child(3) { animation-delay: 0.32s; }
  .hof-find:nth-child(4) { animation-delay: 0.38s; }
  .hof-find:nth-child(5) { animation-delay: 0.44s; }
  .hof-find:nth-child(6) { animation-delay: 0.50s; }
  .hof-find:nth-child(7) { animation-delay: 0.56s; }
  .hof-find:nth-child(8) { animation-delay: 0.62s; }
  .hof-find:hover {
    border-color: var(--green-mid);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px var(--green-shadow);
  }
  .hof-find-photo {
    width: 100%; height: 130px;
    background: var(--green-pale) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border-bottom: 1.5px solid var(--border);
  }
  .hof-find-ini {
    font-family: var(--font1);
    font-size: 2rem;
    color: var(--green-dark);
    opacity: 0.35;
  }
  .hof-find-pill { position: absolute; top: 8px; right: 8px; }
  .hof-find-body { padding: 10px 12px 12px; }
  .hof-find-name {
    font-family: var(--font2);
    font-size: 0.82rem; font-weight: 800;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hof-find-meta {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hof-find-stat {
    font-family: var(--font1);
    font-size: 1rem;
    color: var(--green-dark);
  }
  .hof-find-stat-sub {
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Rarity filter bar */
  .hof-filter-bar {
    display: inline-flex;
    gap: 4px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 3px;
  }
  .hof-filter-btn {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 100px;
    border: none; background: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .hof-filter-btn.active {
    background: var(--white);
    color: var(--green-dark);
    box-shadow: 0 1px 3px rgba(0,37,77,0.08);
  }

  /* District tiles */
  .hof-districts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
    gap: 6px;
  }
  .hof-district-tile {
    background: var(--green-pale);
    border: 1.5px solid var(--green-mid);
    border-radius: var(--radius-sm);
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .hof-district-tile:hover,
  .hof-district-tile.highlight {
    background: var(--white);
    border-color: var(--green);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--green-shadow);
  }
  .hof-district-tile .d-count {
    font-family: var(--font1);
    font-size: 1.2rem;
    color: var(--green-dark);
    line-height: 1;
    margin-bottom: 2px;
  }
  .hof-district-tile .d-name {
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 800;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hof-district-tile.heavy::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
  }
  .hof-rank-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    transition: all 0.15s;
  }
  .hof-rank-row.highlight {
    background: var(--green-pale);
    transform: translateX(3px);
  }
  .hof-rank-row .r-name {
    font-family: var(--font2);
    font-size: 0.75rem; font-weight: 800;
    color: var(--text);
  }
  .hof-rank-row .r-count {
    font-family: var(--font1);
    font-size: 0.9rem;
    color: var(--green-dark);
  }

  /* Velocity chart */
  .hof-chart-wrap {
    position: relative;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1.5px solid var(--border);
  }
  .hof-chart {
    width: 100%;
    height: 180px;
    display: block;
    overflow: visible;
  }
  .hof-chart-line {
    fill: none;
    stroke: var(--green);
    stroke-width: 2.5;
    stroke-linejoin: round;
    stroke-linecap: round;
    stroke-dasharray: 1400;
    stroke-dashoffset: 1400;
    animation: hofDrawLine 1.4s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
  }
  .hof-chart-area {
    fill: url(#hofVeloArea);
    opacity: 0;
    animation: hofFadeUp 0.8s ease 1.2s forwards;
  }
  .hof-chart-dot {
    fill: var(--green-dark);
    opacity: 0;
    animation: hofFadeUp 0.3s ease forwards;
    cursor: pointer;
    transition: r 0.15s;
  }
  .hof-chart-dot:hover { r: 5.5; }
  .hof-tooltip {
    position: fixed;
    background: var(--dark);
    color: #fff;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    font-family: var(--font2);
    font-size: 0.68rem; font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    transform: translate(-50%, -100%);
    z-index: 20;
    white-space: nowrap;
  }
  .hof-tooltip.show { opacity: 1; }
  .hof-tooltip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--dark);
  }
  .hof-chart-stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .hof-chart-stat .n {
    font-family: var(--font1);
    font-size: 1.3rem;
    color: var(--green-dark);
    line-height: 1;
  }
  .hof-chart-stat .l {
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  /* Season Goals */
  .hof-goal {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: all 0.15s;
  }
  .hof-goal:hover {
    border-color: var(--green-mid);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--green-shadow);
  }
  .hof-goal.done {
    background: var(--green-pale);
    border-color: var(--green-mid);
  }
  .hof-goal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .hof-goal-title {
    font-family: var(--font2);
    font-size: 0.78rem; font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }
  .hof-goal-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .hof-goal-progress {
    font-family: var(--font1);
    font-size: 0.8rem;
    color: var(--green-dark);
    flex-shrink: 0;
  }

  /* Personal Records */
  .hof-record {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--green);
    cursor: pointer;
    transition: all 0.15s;
    gap: 10px;
  }
  .hof-record:hover {
    border-color: var(--green-mid);
    border-left-color: var(--green-dark);
    transform: translateX(2px);
    box-shadow: 0 3px 10px var(--green-shadow);
  }
  .hof-record-label {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .hof-record-val {
    text-align: right;
    min-width: 0;
  }
  .hof-record-val .v {
    font-family: var(--font1);
    font-size: 0.95rem;
    color: var(--green-dark);
    line-height: 1.1;
  }
  .hof-record-val .sub {
    display: block;
    font-family: var(--font2);
    font-size: 0.58rem; font-weight: 700;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Wrap-up */
  .hof-wrap { padding: 22px 24px; }
  .hof-wrap-label {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 900;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 10px;
  }
  .hof-wrap-text {
    font-family: var(--font2);
    font-size: 0.95rem; font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }
  .hof-wrap-text strong { color: var(--green-dark); font-weight: 900; }
  .hof-wrap-text em     { color: var(--accent); font-style: normal; font-weight: 900; }

  .hof-sub {
    font-family: var(--font2);
    font-size: 0.62rem; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .hof-loading {
    padding: 60px 20px;
    text-align: center;
    font-family: var(--font2);
    font-weight: 700;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    .hof-find { flex-basis: 160px; }
    .hof-wrap { padding: 18px 16px; }
    .hof-wrap-text { font-size: 0.88rem; }
    .hof-chart-stats { gap: 16px; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Hall of Fame</div>
          <div class="topbar-sub" id="hofTopSub">Your scouting season at a glance</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div id="hofLoading" class="hof-loading">Loading your Hall of Fame…</div>
      <div id="hofContent" style="display:none"></div>
      <div id="hofTooltip" class="hof-tooltip"></div>
    </div>

  </div>
</div>

<script src="api.js"></script>
<script src="js/app.js"></script>
<script>
Auth.require();
buildSidebar('hall');

const currentUser = Auth.require();
const scoutName = currentUser?.name || 'Scout';
const firstName = (scoutName.split(' ')[0] || 'Scout');
const currentYear = new Date().getFullYear();

// ── HELPERS ─────────────────────────────────────────────────────
function toArray(res) {
  if (Array.isArray(res)) return res;
  if (!res || typeof res !== 'object') return [];
  if (Array.isArray(res.players)) return res.players;
  if (Array.isArray(res.batches)) return res.batches;
  if (Array.isArray(res.data))    return res.data;
  if (Array.isArray(res.rows))    return res.rows;
  for (const k of Object.keys(res)) {
    if (Array.isArray(res[k])) return res[k];
  }
  return [];
}
function num(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}
function age(dob) {
  if (!dob) return null;
  const b = new Date(dob);
  if (isNaN(b.getTime())) return null;
  return (Date.now() - b.getTime()) / (365.25 * 24 * 60 * 60 * 1000);
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '';
  return dt.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
}
function initials(name) {
  return (name||'').split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase();
}
function bestVelo(p)   { return num(p.dev_velo)       ?? num(p.velo); }
function bestWeight(p) { return num(p.dev_weight_lbs) ?? num(p.weight_lbs); }
function bestHeight(p) { return p.dev_height_ft || p.height_ft || p.init_height_ft; }
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function classifyRarity(p) {
  const v = bestVelo(p);
  const a = age(p.dob);
  if (v === null) return null;
  const baselines = [
    { maxAge: 10, baseline: 45 },
    { maxAge: 12, baseline: 52 },
    { maxAge: 14, baseline: 60 },
    { maxAge: 16, baseline: 68 },
    { maxAge: 18, baseline: 74 },
    { maxAge: 99, baseline: 78 },
  ];
  let base = 60;
  if (a !== null) { for (const t of baselines) { if (a <= t.maxAge) { base = t.baseline; break; } } }
  const delta = v - base;
  if (delta >= 10) return 'ELITE';
  if (delta >= 5)  return 'PROMISING';
  return null;
}

function countUp(el, target, duration) {
  duration = duration || 900;
  const start = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(target * eased);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = target;
  }
  requestAnimationFrame(tick);
}

// ── RENDERERS ───────────────────────────────────────────────────

function renderHero(players, batches) {
  const admitted = players.filter(p => p.outcome === 'admitted');
  const districts = new Set(players.map(p => p.district).filter(Boolean));
  const batchesThisYear = batches.filter(b => {
    const y = b.start_date ? new Date(b.start_date).getFullYear() :
              b.created_at ? new Date(b.created_at).getFullYear() : currentYear;
    return y === currentYear;
  });

  return `
    <div class="hof-sec d0" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;gap:12px;flex-wrap:wrap">
        <div style="font-family:var(--font1);font-size:1.15rem;color:var(--text);letter-spacing:-0.01em">
          ${escapeHtml(firstName)}'s Hall of Fame
        </div>
        <span class="pill pill-muted">${currentYear} Season</span>
      </div>
      <div class="metrics-grid hof-cascade">
        <div class="metric-card" onclick="window.location.href='players.html?outcome=admitted'">
          <div class="mc-top">
            <div class="mc-icon">
              <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
            </div>
          </div>
          <div class="mc-value" data-count="${admitted.length}">0</div>
          <div class="mc-label">Players Admitted</div>
        </div>
        <div class="metric-card" onclick="window.location.href='players.html'">
          <div class="mc-top">
            <div class="mc-icon amber">
              <svg viewBox="0 0 16 16"><path d="M8 1v14M1 8h14"/></svg>
            </div>
          </div>
          <div class="mc-value" data-count="${districts.size}">0</div>
          <div class="mc-label">Districts Scouted</div>
        </div>
        <div class="metric-card" onclick="window.location.href='tryouts.html'">
          <div class="mc-top">
            <div class="mc-icon blue">
              <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
            </div>
          </div>
          <div class="mc-value" data-count="${batchesThisYear.length}">0</div>
          <div class="mc-label">Tryout Batches</div>
        </div>
      </div>
    </div>
  `;
}

function renderDiscoveryReel(players) {
  const scored = players
    .map(p => {
      const rarity = classifyRarity(p);
      if (!rarity) return null;
      return { p, rarity, v: bestVelo(p) };
    })
    .filter(Boolean)
    .sort((a, b) => {
      if (a.rarity !== b.rarity) return a.rarity === 'ELITE' ? -1 : 1;
      return b.v - a.v;
    })
    .slice(0, 8);

  if (scored.length === 0) {
    return `
      <div class="hof-sec d1 card" style="margin-bottom:14px">
        <div class="card-head"><span class="card-title">Rare Finds</span></div>
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 16 16"><path d="M8 2l2 4 4 .5-3 3 1 4-4-2-4 2 1-4-3-3 4-.5z"/></svg>
          </div>
          <div class="empty-title">No rare finds yet</div>
          <div class="empty-sub">Add velocity readings to players and your best discoveries will surface here.</div>
        </div>
      </div>`;
  }

  const eliteCount = scored.filter(s => s.rarity === 'ELITE').length;
  const promiseCount = scored.filter(s => s.rarity === 'PROMISING').length;

  const cards = scored.map(({ p, rarity, v }) => {
    const photo = p.photo_url
      ? `<div class="hof-find-photo" style="background-image:url('${escapeHtml(p.photo_url)}')"></div>`
      : `<div class="hof-find-photo"><div class="hof-find-ini">${initials(p.name)}</div></div>`;
    const pillClass = rarity === 'ELITE' ? 'pill-green' : 'pill-amber';
    return `
      <a class="hof-find" data-rarity="${rarity}" href="profile.html?id=${encodeURIComponent(p.id)}">
        ${photo}
        <span class="pill ${pillClass} hof-find-pill">${rarity}</span>
        <div class="hof-find-body">
          <div class="hof-find-name">${escapeHtml(p.name||'Unknown')}</div>
          <div class="hof-find-meta">${escapeHtml(p.district||'—')} · ${escapeHtml(p.class||'—')}</div>
          <div class="hof-find-stat">${v} <span class="hof-find-stat-sub">mph</span></div>
        </div>
      </a>
    `;
  }).join('');

  return `
    <div class="hof-sec d1 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Rare Finds</span>
        <div class="hof-filter-bar" id="hofFilterBar">
          <button class="hof-filter-btn active" data-filter="ALL">All · ${scored.length}</button>
          ${eliteCount ? `<button class="hof-filter-btn" data-filter="ELITE">Elite · ${eliteCount}</button>` : ''}
          ${promiseCount ? `<button class="hof-filter-btn" data-filter="PROMISING">Promising · ${promiseCount}</button>` : ''}
        </div>
      </div>
      <div class="hof-reel" id="hofReel">${cards}</div>
    </div>
  `;
}

function renderDistricts(players) {
  const counts = {};
  players.forEach(p => { if (p.district) counts[p.district] = (counts[p.district]||0) + 1; });
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  if (entries.length === 0) {
    return `
      <div class="hof-sec d2 card" style="margin-bottom:14px">
        <div class="card-head"><span class="card-title">Your Territory</span></div>
        <div class="empty-state">
          <div class="empty-title">No district data yet</div>
          <div class="empty-sub">Add districts to your players to see your territory map.</div>
        </div>
      </div>`;
  }
  const max = entries[0][1];
  const pins = entries.map(([d, n]) => {
    const heavy = n >= Math.max(3, max * 0.5);
    return `
      <div class="hof-district-tile${heavy ? ' heavy' : ''}" data-district="${escapeHtml(d)}">
        <div class="d-count">${n}</div>
        <div class="d-name">${escapeHtml(d)}</div>
      </div>`;
  }).join('');
  const top5 = entries.slice(0, 5).map(([d, n]) => `
    <div class="hof-rank-row" data-district="${escapeHtml(d)}">
      <span class="r-name">${escapeHtml(d)}</span>
      <span class="r-count">${n}</span>
    </div>`).join('');

  return `
    <div class="hof-sec d2 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Your Territory</span>
        <span class="hof-sub">${entries.length} districts</span>
      </div>
      <div class="grid-2-1">
        <div class="hof-districts-grid" id="hofDistrictsGrid">${pins}</div>
        <div id="hofTop5">
          <div class="hof-sub" style="margin-bottom:8px">Top districts</div>
          ${top5}
        </div>
      </div>
    </div>
  `;
}

function renderVelocityChart(players) {
  const pts = players
    .filter(p => p.outcome === 'admitted')
    .map(p => {
      const v = bestVelo(p);
      if (v === null) return null;
      const created = p.created_at ? new Date(p.created_at).getTime() : 0;
      return { v, created, name: p.name||'Unknown' };
    })
    .filter(Boolean)
    .sort((a,b) => a.created - b.created);

  if (pts.length < 3) {
    return `
      <div class="hof-sec d3 card" style="margin-bottom:14px">
        <div class="card-head"><span class="card-title">Velocity Trajectory</span></div>
        <div class="empty-state">
          <div class="empty-title">Need more data</div>
          <div class="empty-sub">At least 3 admitted players with velocity readings required.</div>
        </div>
      </div>`;
  }

  const w = 640, h = 180, padL = 34, padR = 14, padT = 14, padB = 24;
  const chartW = w - padL - padR, chartH = h - padT - padB;
  const vs = pts.map(p => p.v);
  const vMax = Math.max(...vs), vMin = Math.min(...vs);
  const range = Math.max(1, vMax - vMin);
  const xAt = i => padL + (pts.length === 1 ? chartW/2 : (i/(pts.length-1)) * chartW);
  const yAt = v => padT + (1 - (v - vMin) / range) * chartH;

  let linePath = '';
  pts.forEach((p, i) => { linePath += (i === 0 ? 'M' : 'L') + xAt(i) + ',' + yAt(p.v) + ' '; });
  const areaPath = linePath + 'L' + xAt(pts.length-1) + ',' + (padT + chartH) + ' L' + xAt(0) + ',' + (padT + chartH) + ' Z';

  const dots = pts.map((p, i) => {
    const delay = 1.4 + (i / pts.length) * 0.5;
    return `<circle class="hof-chart-dot" cx="${xAt(i)}" cy="${yAt(p.v)}" r="3.5"
              style="animation-delay:${delay.toFixed(2)}s"
              data-name="${escapeHtml(p.name)}" data-velo="${p.v}"></circle>`;
  }).join('');

  const avg = (vs.reduce((s,v)=>s+v,0) / vs.length).toFixed(1);
  const trend = (vs[vs.length-1] - vs[0]).toFixed(1);
  const trendSign = parseFloat(trend) >= 0 ? '+' : '';

  return `
    <div class="hof-sec d3 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Velocity Trajectory</span>
        <span class="hof-sub">${pts.length} admits · hover any point</span>
      </div>
      <div class="hof-chart-wrap" id="hofChartWrap">
        <svg class="hof-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="hofVeloArea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#005A9C" stop-opacity=".28"/>
              <stop offset="100%" stop-color="#005A9C" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <line x1="${padL}" y1="${padT+chartH}" x2="${w-padR}" y2="${padT+chartH}" stroke="#d8e4f0" stroke-width="1"/>
          <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#d8e4f0" stroke-width="1"/>
          <path class="hof-chart-area" d="${areaPath}"/>
          <path class="hof-chart-line" d="${linePath}"/>
          ${dots}
          <text x="${padL-6}" y="${padT+5}" text-anchor="end" font-size="9" fill="#5B7A96" font-family="Nunito,sans-serif" font-weight="700">${vMax}</text>
          <text x="${padL-6}" y="${padT+chartH+2}" text-anchor="end" font-size="9" fill="#5B7A96" font-family="Nunito,sans-serif" font-weight="700">${vMin}</text>
        </svg>
        <div class="hof-chart-stats">
          <div class="hof-chart-stat"><div class="n">${avg}</div><div class="l">Avg mph</div></div>
          <div class="hof-chart-stat"><div class="n">${vMax}</div><div class="l">Peak mph</div></div>
          <div class="hof-chart-stat"><div class="n">${trendSign}${trend}</div><div class="l">Season trend</div></div>
        </div>
      </div>
    </div>
  `;
}

function renderGoals(players, batches) {
  const admitted = players.filter(p => p.outcome === 'admitted');
  const divisions = new Set(players.map(p => p.division).filter(Boolean));

  const goals = [
    { label: 'Cover all regions of Uganda',       done: divisions.size, target: 4  },
    { label: 'Admit 50 players to the program',   done: admitted.length, target: 50 },
    { label: 'Run 10 tryout batches',              done: batches.length,  target: 10 },
  ];

  const cards = goals.map(g => {
    const done = Math.min(g.done, g.target);
    const pct = Math.round((done / g.target) * 100);
    const complete = done >= g.target;
    return `
      <div class="hof-goal${complete ? ' done' : ''}">
        <div class="hof-goal-head">
          <div class="hof-goal-title">${g.label}</div>
          ${complete ? '<span class="pill pill-green">Done</span>' : ''}
        </div>
        <div class="hof-goal-bar-row">
          <div class="bar-track"><div class="bar-fill g" data-pct="${pct}" style="width:0%"></div></div>
          <div class="hof-goal-progress">${done}/${g.target}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="hof-sec d4 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Season Goals</span>
        <span class="hof-sub">${currentYear} targets</span>
      </div>
      <div class="col-stack">${cards}</div>
    </div>
  `;
}

function renderRecords(players) {
  let fastest = null, tallest = null, youngest = null, heaviest = null, mostRecent = null;
  players.forEach(p => {
    const v = bestVelo(p);
    if (v !== null && (!fastest || v > fastest.v)) fastest = { v, p };
    const h = bestHeight(p);
    if (h) {
      const m = String(h).match(/^(\d+)'(\d+(?:\.\d+)?)/);
      if (m) {
        const totalIn = parseInt(m[1])*12 + parseFloat(m[2]);
        if (!tallest || totalIn > tallest.totalIn) tallest = { totalIn, h, p };
      }
    }
    const a = age(p.dob);
    if (a !== null && p.outcome === 'admitted') {
      if (!youngest || a < youngest.a) youngest = { a, p };
    }
    const w = bestWeight(p);
    if (w !== null && (!heaviest || w > heaviest.w)) heaviest = { w, p };
    if (p.created_at) {
      const t = new Date(p.created_at).getTime();
      if (!mostRecent || t > mostRecent.t) mostRecent = { t, p };
    }
  });

  const records = [];
  if (fastest)    records.push({ label: 'Fastest Velocity', value: fastest.v + ' mph',          sub: fastest.p.name,   id: fastest.p.id });
  if (tallest)    records.push({ label: 'Tallest Player',   value: tallest.h,                   sub: tallest.p.name,   id: tallest.p.id });
  if (youngest)   records.push({ label: 'Youngest Admit',   value: youngest.a.toFixed(1) + ' yrs', sub: youngest.p.name, id: youngest.p.id });
  if (heaviest)   records.push({ label: 'Heaviest Player',  value: heaviest.w + ' lbs',         sub: heaviest.p.name,  id: heaviest.p.id });
  if (mostRecent) records.push({ label: 'Most Recent Find', value: fmtDate(mostRecent.p.created_at), sub: mostRecent.p.name, id: mostRecent.p.id });
  records.push({ label: 'Total Pipeline', value: players.length + ' players', sub: 'across all tiers', id: null });

  const rows = records.map(r => `
    <div class="hof-record" ${r.id ? `onclick="window.location.href='profile.html?id=${encodeURIComponent(r.id)}'"` : ''}>
      <div class="hof-record-label">${r.label}</div>
      <div class="hof-record-val">
        <div class="v">${escapeHtml(r.value)}</div>
        <span class="sub">${escapeHtml(r.sub||'')}</span>
      </div>
    </div>
  `).join('');

  return `
    <div class="hof-sec d5 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Personal Records</span>
        <span class="hof-sub">Your superlatives</span>
      </div>
      <div class="grid-2">${rows}</div>
    </div>
  `;
}

function renderWrapUp(players) {
  const admitted = players.filter(p => p.outcome === 'admitted');
  const districts = new Set(players.map(p => p.district).filter(Boolean));
  let topFind = null;
  admitted.forEach(p => {
    const v = bestVelo(p);
    if (v !== null && (!topFind || v > topFind.v)) topFind = { v, p };
  });

  let story;
  if (topFind) {
    story = `You've scouted <strong>${players.length} players</strong> across <strong>${districts.size} districts</strong> this season, admitting <strong>${admitted.length}</strong> to the program. Your top find so far? <em>${escapeHtml(topFind.p.name)}</em> out of <strong>${escapeHtml(topFind.p.district || 'Uganda')}</strong>, throwing <strong>${topFind.v} mph</strong>.`;
  } else {
    story = `You've scouted <strong>${players.length} players</strong> across <strong>${districts.size} districts</strong> this season. Keep the measurements coming and your top finds will surface here.`;
  }

  return `
    <div class="hof-sec d6 card hof-wrap">
      <div class="hof-wrap-label">The Season So Far</div>
      <div class="hof-wrap-text">${story}</div>
    </div>
  `;
}

// ── POST-RENDER INTERACTIONS ────────────────────────────────────

function runCountUps() {
  document.querySelectorAll('.mc-value[data-count]').forEach(el => {
    const target = parseInt(el.getAttribute('data-count'), 10) || 0;
    setTimeout(() => countUp(el, target, 950), 200);
  });
}

function animateProgressBars() {
  // bar-fill has transition: width 0.8s cubic-bezier baked in - just flip the width.
  setTimeout(() => {
    document.querySelectorAll('.bar-fill[data-pct]').forEach(el => {
      const pct = parseInt(el.getAttribute('data-pct'), 10) || 0;
      el.style.width = pct + '%';
    });
  }, 600);
}

function wireFilterBar() {
  const bar = document.getElementById('hofFilterBar');
  if (!bar) return;
  bar.addEventListener('click', e => {
    const btn = e.target.closest('.hof-filter-btn');
    if (!btn) return;
    const filter = btn.getAttribute('data-filter');
    bar.querySelectorAll('.hof-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    const reel = document.getElementById('hofReel');
    if (!reel) return;
    reel.querySelectorAll('.hof-find').forEach(card => {
      const r = card.getAttribute('data-rarity');
      card.style.display = (filter === 'ALL' || r === filter) ? '' : 'none';
    });
  });
}

function wireDistrictHover() {
  const grid = document.getElementById('hofDistrictsGrid');
  const top5 = document.getElementById('hofTop5');
  if (!grid || !top5) return;

  function highlight(district, on) {
    grid.querySelectorAll('.hof-district-tile').forEach(t => {
      t.classList.toggle('highlight', on && t.getAttribute('data-district') === district);
    });
    top5.querySelectorAll('.hof-rank-row').forEach(r => {
      r.classList.toggle('highlight', on && r.getAttribute('data-district') === district);
    });
  }

  grid.addEventListener('mouseover', e => {
    const tile = e.target.closest('.hof-district-tile');
    if (tile) highlight(tile.getAttribute('data-district'), true);
  });
  grid.addEventListener('mouseout', e => {
    const tile = e.target.closest('.hof-district-tile');
    if (tile) highlight(tile.getAttribute('data-district'), false);
  });
  top5.addEventListener('mouseover', e => {
    const row = e.target.closest('.hof-rank-row');
    if (row) highlight(row.getAttribute('data-district'), true);
  });
  top5.addEventListener('mouseout', e => {
    const row = e.target.closest('.hof-rank-row');
    if (row) highlight(row.getAttribute('data-district'), false);
  });
}

function wireChartTooltips() {
  const wrap = document.getElementById('hofChartWrap');
  const tip = document.getElementById('hofTooltip');
  if (!wrap || !tip) return;

  wrap.addEventListener('mouseover', e => {
    const dot = e.target.closest('.hof-chart-dot');
    if (!dot) return;
    const name = dot.getAttribute('data-name');
    const velo = dot.getAttribute('data-velo');
    tip.innerHTML = `<strong>${name}</strong> &middot; ${velo} mph`;
    const rect = dot.getBoundingClientRect();
    tip.style.left = (rect.left + rect.width/2) + 'px';
    tip.style.top  = (rect.top - 8) + 'px';
    tip.classList.add('show');
  });
  wrap.addEventListener('mouseout', e => {
    if (e.target.closest('.hof-chart-dot')) tip.classList.remove('show');
  });
}

// ── MAIN ────────────────────────────────────────────────────────
async function loadHallOfFame() {
  try {
    const [playersRes, batchesRes] = await Promise.all([
      PlayerAPI.getAll().catch(() => []),
      TryoutAPI.getAll().catch(() => []),
    ]);
    const players = toArray(playersRes);
    const batches = toArray(batchesRes);

    const html = [
      renderHero(players, batches),
      renderDiscoveryReel(players),
      renderDistricts(players),
      renderVelocityChart(players),
      renderGoals(players, batches),
      renderRecords(players),
      renderWrapUp(players),
    ].join('');

    document.getElementById('hofLoading').style.display = 'none';
    const content = document.getElementById('hofContent');
    content.innerHTML = html;
    content.style.display = 'block';

    const admitted = players.filter(p => p.outcome === 'admitted').length;
    document.getElementById('hofTopSub').textContent =
      `${admitted} admitted · ${players.length} total · ${currentYear} season`;

    runCountUps();
    animateProgressBars();
    wireFilterBar();
    wireDistrictHover();
    wireChartTooltips();
  } catch (e) {
    document.getElementById('hofLoading').innerHTML =
      'Could not load Hall of Fame. ' + (e.message || 'Please try again.');
  }
}

loadHallOfFame();
</script>
