// ── DISTRICTS + TIER DONUT ──────────────────────────────────────
function renderDistricts(players) {
  const counts = {};
  players.forEach(p => { if (p.district) counts[p.district] = (counts[p.district]||0) + 1; });
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);

  // Tier distribution
  const tierCounts = { t1: 0, t15: 0, t2: 0, t3: 0 };
  players.forEach(p => {
    if (!p.tier) return;
    const t = String(p.tier);
    if (t === '1') tierCounts.t1++;
    else if (t === '1.5') tierCounts.t15++;
    else if (t === '2') tierCounts.t2++;
    else if (t === '3') tierCounts.t3++;
  });
  const tierTotal = tierCounts.t1 + tierCounts.t15 + tierCounts.t2 + tierCounts.t3;

  const donut = tierTotal > 0 ? renderDonut(tierCounts, tierTotal) : '';

  if (entries.length === 0 && tierTotal === 0) {
    return `
      <div class="hof-sec d8 card" style="margin-bottom:14px">
        <div class="card-head"><span class="card-title">Your Territory</span></div>
        <div class="empty-state">
          <div class="empty-title">No district data yet</div>
        </div>
      </div>`;
  }

  const max = entries.length > 0 ? entries[0][1] : 0;
  const pins = entries.map(([d, n]) => {
    const heavy = n >= Math.max(3, max * 0.5);
    return `
      <div class="hof-district-tile${heavy ? ' heavy' : ''}" data-district="${escapeHtml(d)}">
        <div class="d-count">${n}</div>
        <div class="d-name">${escapeHtml(d)}</div>
      </div>`;
  }).join('');
  const top5 = entries.slice(0, 5).map(([d, n]) => `
    <div class="hof-rank-row" data-district="${escapeHtml(d)}">
      <span class="r-name">${escapeHtml(d)}</span>
      <span class="r-count">${n}</span>
    </div>`).join('');

  return `
    <div class="hof-sec d8 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Your Territory</span>
        <span class="hof-sub">${entries.length} districts</span>
      </div>
      <div class="grid-2-1">
        <div class="hof-districts-grid" id="hofDistrictsGrid">${pins}</div>
        <div id="hofTop5">
          <div class="hof-sub" style="margin-bottom:8px">Top districts</div>
          ${top5}
          ${donut}
        </div>
      </div>
    </div>
  `;
}

function renderDonut(counts, total) {
  // Dasharray math: circle r=50, circumference ~314
  const C = 314;
  const tiers = [
    { key: 't1',  label: 'T1',   color: 'var(--tier1)',  n: counts.t1  },
    { key: 't15', label: 'T1.5', color: 'var(--tier15)', n: counts.t15 },
    { key: 't2',  label: 'T2',   color: 'var(--tier2)',  n: counts.t2  },
    { key: 't3',  label: 'T3',   color: 'var(--tier3)',  n: counts.t3  },
  ];
  let offset = 0;
  const segs = tiers.filter(t => t.n > 0).map((t, i) => {
    const frac = t.n / total;
    const len = frac * C;
    const gap = C - len;
    const seg = `<circle class="seg" cx="60" cy="60" r="50"
      stroke="${t.color}"
      stroke-dasharray="${len} ${gap}"
      stroke-dashoffset="${(-offset).toFixed(1)}"
      style="animation-delay:${0.6 + i*0.15}s"/>`;
    offset += len;
    return seg;
  }).join('');

  const legend = tiers.map(t => `
    <div class="hof-donut-legend-item">
      <span class="hof-donut-legend-swatch" style="background:${t.color}"></span>
      ${t.label} <strong>${t.n}</strong>
    </div>
  `).join('');

  return `
    <div class="hof-donut">
      <div class="hof-donut-svg">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle class="track" cx="60" cy="60" r="50"/>
          ${segs}
        </svg>
        <div class="hof-donut-center">
          <div class="hof-donut-total">${total}</div>
          <div class="hof-donut-lbl">Tiered</div>
        </div>
      </div>
      <div class="hof-donut-legend">${legend}</div>
    </div>
  `;
}

// ── VELOCITY TRAJECTORY ─────────────────────────────────────────
function renderVelocityChart(players) {
  const pts = players
    .filter(p => p.outcome === 'admitted')
    .map(p => {
      const v = bestVelo(p);
      if (v === null) return null;
      const created = p.created_at ? new Date(p.created_at).getTime() : 0;
      return { v, created, name: p.name||'Unknown' };
    })
    .filter(Boolean)
    .sort((a,b) => a.created - b.created);

  if (pts.length < 3) {
    return `
      <div class="hof-sec d9 card" style="margin-bottom:14px">
        <div class="card-head"><span class="card-title">Velocity Trajectory</span></div>
        <div class="empty-state">
          <div class="empty-title">Need more data</div>
          <div class="empty-sub">At least 3 admitted players with velocity readings required.</div>
        </div>
      </div>`;
  }

  const w = 640, h = 180, padL = 34, padR = 14, padT = 14, padB = 24;
  const chartW = w - padL - padR, chartH = h - padT - padB;
  const vs = pts.map(p => p.v);
  const vMax = Math.max(...vs), vMin = Math.min(...vs);
  const range = Math.max(1, vMax - vMin);
  const xAt = i => padL + (pts.length === 1 ? chartW/2 : (i/(pts.length-1)) * chartW);
  const yAt = v => padT + (1 - (v - vMin) / range) * chartH;

  let linePath = '';
  pts.forEach((p, i) => { linePath += (i === 0 ? 'M' : 'L') + xAt(i) + ',' + yAt(p.v) + ' '; });
  const areaPath = linePath + 'L' + xAt(pts.length-1) + ',' + (padT + chartH) + ' L' + xAt(0) + ',' + (padT + chartH) + ' Z';

  const dots = pts.map((p, i) => {
    const delay = 1.4 + (i / pts.length) * 0.5;
    return `<circle class="hof-chart-dot" cx="${xAt(i)}" cy="${yAt(p.v)}" r="3.5"
              style="animation-delay:${delay.toFixed(2)}s"
              data-name="${escapeHtml(p.name)}" data-velo="${p.v}"></circle>`;
  }).join('');

  const avg = (vs.reduce((s,v)=>s+v,0) / vs.length).toFixed(1);
  const trend = (vs[vs.length-1] - vs[0]).toFixed(1);
  const trendSign = parseFloat(trend) >= 0 ? '+' : '';

  return `
    <div class="hof-sec d9 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Velocity Trajectory</span>
        <span class="hof-sub">${pts.length} admits · hover any point</span>
      </div>
      <div class="hof-chart-wrap" id="hofChartWrap">
        <svg class="hof-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="hofVeloArea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#005A9C" stop-opacity=".28"/>
              <stop offset="100%" stop-color="#005A9C" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <line x1="${padL}" y1="${padT+chartH}" x2="${w-padR}" y2="${padT+chartH}" stroke="#d8e4f0" stroke-width="1"/>
          <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#d8e4f0" stroke-width="1"/>
          <path class="hof-chart-area" d="${areaPath}"/>
          <path class="hof-chart-line" d="${linePath}"/>
          ${dots}
          <text x="${padL-6}" y="${padT+5}" text-anchor="end" font-size="9" fill="#5B7A96" font-family="Nunito,sans-serif" font-weight="700">${vMax}</text>
          <text x="${padL-6}" y="${padT+chartH+2}" text-anchor="end" font-size="9" fill="#5B7A96" font-family="Nunito,sans-serif" font-weight="700">${vMin}</text>
        </svg>
        <div class="hof-chart-stats">
          <div class="hof-chart-stat"><div class="n">${avg}</div><div class="l">Avg mph</div></div>
          <div class="hof-chart-stat"><div class="n">${vMax}</div><div class="l">Peak mph</div></div>
          <div class="hof-chart-stat"><div class="n">${trendSign}${trend}</div><div class="l">Season trend</div></div>
        </div>
      </div>
    </div>
  `;
}

// ── MONTHLY RHYTHM ──────────────────────────────────────────────
function renderRhythm(players) {
  const monthCounts = new Array(12).fill(0);
  players.forEach(p => {
    if (!inSeason(p, viewSeason)) return;
    if (!p.created_at) return;
    const d = new Date(p.created_at);
    if (isNaN(d.getTime())) return;
    monthCounts[d.getMonth()]++;
  });
  const max = Math.max(...monthCounts, 1);
  const total = monthCounts.reduce((s,n) => s+n, 0);
  if (total === 0) return '';

  const monthLabels = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const bars = monthCounts.map((n, i) => {
    const pct = (n / max) * 100;
    const quiet = n === 0;
    const delay = 0.3 + i * 0.04;
    return `
      <div class="hof-rhythm-bar">
        <div class="hof-rhythm-col${quiet ? ' quiet' : ''}" style="height:${Math.max(pct, quiet ? 6 : 8)}%;animation-delay:${delay}s" data-count="${n}"></div>
        <div class="hof-rhythm-label">${monthLabels[i]}</div>
      </div>`;
  }).join('');

  return `
    <div class="hof-sec d10 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Your Rhythm</span>
        <span class="hof-sub">${total} players · ${viewSeason}</span>
      </div>
      <div class="hof-rhythm">${bars}</div>
    </div>
  `;
}

// ── SEASON GOALS ────────────────────────────────────────────────
function renderGoals(players, batches) {
  const seasonPlayers = players.filter(p => inSeason(p, viewSeason));
  const admitted = seasonPlayers.filter(p => p.outcome === 'admitted');
  const divisions = new Set(seasonPlayers.map(p => p.division).filter(Boolean));
  const seasonBatches = batches.filter(b => {
    const y = b.start_date ? new Date(b.start_date).getFullYear() :
              b.created_at ? new Date(b.created_at).getFullYear() : null;
    return y === viewSeason;
  });

  const goals = [
    { label: 'Cover all regions of Uganda',       done: divisions.size,        target: 4  },
    { label: 'Admit 50 players to the program',   done: admitted.length,       target: 50 },
    { label: 'Run 10 tryout batches',              done: seasonBatches.length, target: 10 },
  ];

  const cards = goals.map(g => {
    const done = Math.min(g.done, g.target);
    const pct = Math.round((done / g.target) * 100);
    const complete = done >= g.target;
    return `
      <div class="hof-goal${complete ? ' done' : ''}">
        <div class="hof-goal-head">
          <div class="hof-goal-title">${g.label}</div>
          ${complete ? '<span class="pill pill-green">Done</span>' : ''}
        </div>
        <div class="hof-goal-bar-row">
          <div class="bar-track"><div class="bar-fill g" data-pct="${pct}" style="width:0%"></div></div>
          <div class="hof-goal-progress">${done}/${g.target}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="hof-sec d11 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Season Goals</span>
        <span class="hof-sub">${viewSeason} targets</span>
      </div>
      <div class="col-stack">${cards}</div>
    </div>
  `;
}

// ── HOME VISITS ─────────────────────────────────────────────────
function renderHomeVisits(players) {
  // Infer status from player fields. We don't have a visits count per player available cheaply,
  // so use admitted players + some simple heuristics:
  //   - "done" = admitted players with a non-empty home_visit flag/date
  //   - "pending" = admitted players with no home visit yet
  //   - "overdue" = admitted > 30 days ago without visit
  const admitted = players.filter(p => p.outcome === 'admitted');
  let done = 0, pending = 0, overdue = 0;
  const now = Date.now();

  admitted.forEach(p => {
    const hasVisit = !!(p.home_visit_at || p.home_visit_date || p.home_visit_completed || p.visited_home);
    if (hasVisit) { done++; return; }
    const createdMs = p.created_at ? new Date(p.created_at).getTime() : 0;
    const daysSince = createdMs ? (now - createdMs) / 86400000 : 0;
    if (daysSince > 30) overdue++;
    else pending++;
  });

  // If we have literally no signal at all, skip the section rather than lie
  if (admitted.length === 0) return '';

  return `
    <div class="hof-sec d11 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Home Visits</span>
        <span class="hof-sub">Admitted players</span>
      </div>
      <div class="hof-hv-row">
        <div class="hof-hv done">
          <div class="n">${done}</div>
          <div class="l">Completed</div>
        </div>
        <div class="hof-hv pending">
          <div class="n">${pending}</div>
          <div class="l">Pending</div>
        </div>
        <div class="hof-hv overdue">
          <div class="n">${overdue}</div>
          <div class="l">Overdue</div>
        </div>
      </div>
    </div>
  `;
}

// ── SCOUTING STREAK ─────────────────────────────────────────────
function renderStreak(players) {
  // Count consecutive months (ending at current month) with at least one new admit
  const now = new Date();
  let streak = 0;
  for (let i = 0; i < 60; i++) {
    const checkDate = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const cy = checkDate.getFullYear();
    const cm = checkDate.getMonth();
    const hasAdmit = players.some(p => {
      if (p.outcome !== 'admitted' || !p.created_at) return false;
      const d = new Date(p.created_at);
      if (isNaN(d.getTime())) return false;
      return d.getFullYear() === cy && d.getMonth() === cm;
    });
    if (hasAdmit) streak++;
    else break;
  }

  // Only show when streak >= 2 months (no shaming)
  if (streak < 2) return '';

  return `
    <div class="hof-sec d12" style="margin-bottom:14px">
      <div class="hof-streak">
        <div class="hof-streak-emoji">🔥</div>
        <div class="hof-streak-body">
          <div class="hof-streak-n">${streak} consecutive months</div>
          <div class="hof-streak-l">adding new admits to your pipeline</div>
        </div>
      </div>
    </div>
  `;
}

// ── PERSONAL RECORDS ────────────────────────────────────────────
function renderRecords(players) {
  let fastest = null, tallest = null, youngest = null, heaviest = null, mostRecent = null;
  players.forEach(p => {
    const v = bestVelo(p);
    if (v !== null && (!fastest || v > fastest.v)) fastest = { v, p };
    const h = bestHeight(p);
    if (h) {
      const m = String(h).match(/^(\d+)'(\d+(?:\.\d+)?)/);
      if (m) {
        const totalIn = parseInt(m[1])*12 + parseFloat(m[2]);
        if (!tallest || totalIn > tallest.totalIn) tallest = { totalIn, h, p };
      }
    }
    const a = age(p.dob);
    if (a !== null && p.outcome === 'admitted') {
      if (!youngest || a < youngest.a) youngest = { a, p };
    }
    const w = bestWeight(p);
    if (w !== null && (!heaviest || w > heaviest.w)) heaviest = { w, p };
    if (p.created_at) {
      const t = new Date(p.created_at).getTime();
      if (!mostRecent || t > mostRecent.t) mostRecent = { t, p };
    }
  });

  const records = [];
  if (fastest)    records.push({ label: 'Fastest Velocity', value: fastest.v + ' mph',          sub: fastest.p.name,   id: fastest.p.id });
  if (tallest)    records.push({ label: 'Tallest Player',   value: tallest.h,                   sub: tallest.p.name,   id: tallest.p.id });
  if (youngest)   records.push({ label: 'Youngest Admit',   value: youngest.a.toFixed(1) + ' yrs', sub: youngest.p.name, id: youngest.p.id });
  if (heaviest)   records.push({ label: 'Heaviest Player',  value: heaviest.w + ' lbs',         sub: heaviest.p.name,  id: heaviest.p.id });
  if (mostRecent) records.push({ label: 'Most Recent Find', value: fmtDate(mostRecent.p.created_at), sub: mostRecent.p.name, id: mostRecent.p.id });
  records.push({ label: 'Total Pipeline', value: players.length + ' players', sub: 'across all tiers', id: null });

  const rows = records.map(r => `
    <div class="hof-record" ${r.id ? `onclick="window.location.href='profile.html?id=${encodeURIComponent(r.id)}'"` : ''}>
      <div class="hof-record-label">${r.label}</div>
      <div class="hof-record-val">
        <div class="v">${escapeHtml(r.value)}</div>
        <span class="sub">${escapeHtml(r.sub||'')}</span>
      </div>
    </div>
  `).join('');

  return `
    <div class="hof-sec d11 card" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-title">Personal Records</span>
        <span class="hof-sub">Your superlatives</span>
      </div>
      <div class="grid-2">${rows}</div>
    </div>
  `;
}

// ── WRAP-UP + SHARE ─────────────────────────────────────────────
function renderWrapUp(players) {
  const seasonPlayers = players.filter(p => inSeason(p, viewSeason));
  const admitted = seasonPlayers.filter(p => p.outcome === 'admitted');
  const districts = new Set(seasonPlayers.map(p => p.district).filter(Boolean));
  let topFind = null;
  admitted.forEach(p => {
    const v = bestVelo(p);
    if (v !== null && (!topFind || v > topFind.v)) topFind = { v, p };
  });

  let story;
  if (topFind) {
    story = `You've scouted <strong>${seasonPlayers.length} players</strong> across <strong>${districts.size} districts</strong> this season, admitting <strong>${admitted.length}</strong> to the program. Your top find so far? <em>${escapeHtml(topFind.p.name)}</em> out of <strong>${escapeHtml(topFind.p.district || 'Uganda')}</strong>, throwing <strong>${topFind.v} mph</strong>.`;
  } else {
    story = `You've scouted <strong>${seasonPlayers.length} players</strong> across <strong>${districts.size} districts</strong> this season. Keep the measurements coming and your top finds will surface here.`;
  }

  return `
    <div class="hof-sec d11 card hof-wrap">
      <div class="hof-wrap-head">
        <div class="hof-wrap-label">The ${viewSeason} Season So Far</div>
        <button class="btn btn-outline" onclick="shareSeason()" style="height:30px;font-size:0.7rem">
          <svg viewBox="0 0 16 16"><path d="M12 4l-4-2-4 2M8 2v11M4 9l4 4 4-4"/></svg>
          Share
        </button>
      </div>
      <div class="hof-wrap-text">${story}</div>
    </div>
  `;
}

function runCountUps() {
  document.querySelectorAll('.mc-value[data-count]').forEach(el => {
    const target = parseInt(el.getAttribute('data-count'), 10) || 0;
    setTimeout(() => countUp(el, target, 950), 200);
  });
}

function animateProgressBars() {
  setTimeout(() => {
    document.querySelectorAll('.bar-fill[data-pct]').forEach(el => {
      const pct = parseInt(el.getAttribute('data-pct'), 10) || 0;
      el.style.width = pct + '%';
    });
  }, 600);
}

  // No-op: replaced by independent tier sections (renderTalentTiers).

}

function wireDistrictHover() {
  const grid = document.getElementById('hofDistrictsGrid');
  const top5 = document.getElementById('hofTop5');
  if (!grid || !top5) return;
  function highlight(district, on) {
    grid.querySelectorAll('.hof-district-tile').forEach(t => {
      t.classList.toggle('highlight', on && t.getAttribute('data-district') === district);
    });
    top5.querySelectorAll('.hof-rank-row').forEach(r => {
      r.classList.toggle('highlight', on && r.getAttribute('data-district') === district);
    });
  }
  grid.addEventListener('mouseover', e => {
    const tile = e.target.closest('.hof-district-tile');
    if (tile) highlight(tile.getAttribute('data-district'), true);
  });
  grid.addEventListener('mouseout', e => {
    const tile = e.target.closest('.hof-district-tile');
    if (tile) highlight(tile.getAttribute('data-district'), false);
  });
  top5.addEventListener('mouseover', e => {
    const row = e.target.closest('.hof-rank-row');
    if (row) highlight(row.getAttribute('data-district'), true);
  });
  top5.addEventListener('mouseout', e => {
    const row = e.target.closest('.hof-rank-row');
    if (row) highlight(row.getAttribute('data-district'), false);
  });
}

function wireChartTooltips() {
  const wrap = document.getElementById('hofChartWrap');
  const tip = document.getElementById('hofTooltip');
  if (!wrap || !tip) return;
  wrap.addEventListener('mouseover', e => {
    const dot = e.target.closest('.hof-chart-dot');
    if (!dot) return;
    const name = dot.getAttribute('data-name');
    const velo = dot.getAttribute('data-velo');
    tip.innerHTML = '<strong>' + escapeHtml(name) + '</strong> &middot; ' + escapeHtml(velo) + ' mph';
    const rect = dot.getBoundingClientRect();
    tip.style.left = (rect.left + rect.width/2) + 'px';
    tip.style.top  = (rect.top - 8) + 'px';
    tip.classList.add('show');
  });
  wrap.addEventListener('mouseout', e => {
    if (e.target.closest('.hof-chart-dot')) tip.classList.remove('show');
  });
}

// Wire tooltips for Ahead-of-his-age cards: shows the analytical detail
// (e.g. "+13 mph over age 13 baseline (60)") on hover. The card itself
// already shows the human-friendly "Throws like a 16yo" line inline.
function wireAheadTooltips() {
  const section = document.getElementById('hofAheadSection');
  const tip = document.getElementById('hofTooltip');
  if (!section || !tip) return;

  function showTip(card) {
    const name = card.getAttribute('data-tip-name');
    const stat = card.getAttribute('data-tip-stat');
    if (!name || !stat) return;
    tip.innerHTML = '<strong>' + escapeHtml(name) + '</strong><br>' + escapeHtml(stat);
    const rect = card.getBoundingClientRect();
    tip.style.left = (rect.left + rect.width/2) + 'px';
    tip.style.top  = (rect.top - 8) + 'px';
    tip.classList.add('show');
  }
  function hideTip() { tip.classList.remove('show'); }

  section.addEventListener('mouseover', e => {
    const card = e.target.closest('.hof-find-ahead');
    if (card) showTip(card);
  });
  section.addEventListener('mouseout', e => {
    if (e.target.closest('.hof-find-ahead')) hideTip();
  });
  // Touch support: tap shows tooltip briefly without navigating.
  // We don't preventDefault — the link still works on a second tap.
  section.addEventListener('touchstart', e => {
    const card = e.target.closest('.hof-find-ahead');
    if (card) {
      showTip(card);
      setTimeout(hideTip, 2500);
    }
  }, { passive: true });
}

function wireBannerSpotlight() {
  const banner = document.getElementById('hofBanner');
  if (!banner) return;
  banner.addEventListener('mousemove', e => {
    const rect = banner.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    banner.style.setProperty('--mx', x + '%');
    banner.style.setProperty('--my', y + '%');
  });
  banner.addEventListener('mouseleave', () => {
    banner.style.setProperty('--mx', '50%');
    banner.style.setProperty('--my', '50%');
  });
}

// ── BANNER ACTIONS: motto, location, avatar ─────────────────────
function editMotto() {
  const wrap = document.getElementById('hofMotto');
  const txt = document.getElementById('hofMottoText');
  if (!wrap || !txt) return;
  const current = localStorage.getItem(LS_MOTTO) || '';
  wrap.innerHTML = `
    <svg viewBox="0 0 16 16" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0"><path d="M11 2l3 3-8 8H3v-3z"/></svg>
    <input class="hof-motto-input" id="hofMottoInput" type="text" maxlength="80" placeholder="Your scouting motto…" value="${escapeHtml(current)}">
  `;
  const inp = document.getElementById('hofMottoInput');
  inp.focus();
  inp.select();
  const save = () => {
    const val = inp.value.trim();
    if (val) localStorage.setItem(LS_MOTTO, val);
    else    localStorage.removeItem(LS_MOTTO);
    // Re-render just this chip
    wrap.classList.toggle('empty', !val);
    wrap.innerHTML = `
      <svg viewBox="0 0 16 16" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0"><path d="M11 2l3 3-8 8H3v-3z"/></svg>
      <span class="hof-motto-text" id="hofMottoText">${val ? escapeHtml(val) : 'Your scouting motto…'}</span>
    `;
    wrap.onclick = editMotto;
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = current; inp.blur(); }
  });
}

function editLocation() {
  const pill = document.getElementById('hofLocPill');
  if (!pill) return;
  const current = localStorage.getItem(LS_LOCATION) || DEFAULT_LOCATION;
  pill.innerHTML = `📍 <input class="hof-bpill-input" id="hofLocInput" type="text" maxlength="40" value="${escapeHtml(current)}">`;
  const inp = document.getElementById('hofLocInput');
  inp.focus();
  inp.select();
  const save = () => {
    const val = inp.value.trim() || DEFAULT_LOCATION;
    localStorage.setItem(LS_LOCATION, val);
    pill.innerHTML = `📍 <span id="hofLocText">${escapeHtml(val)}</span>`;
    pill.onclick = editLocation;
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = current; inp.blur(); }
  });
}

function onAvatarClick() {
  const avatar = localStorage.getItem(LS_AVATAR);
  if (avatar) openAvatarLightbox();
  else uploadAvatar();
}

function toggleAvatarActions(e) {
  e.stopPropagation();
  const menu = document.getElementById('hofAvatarActions');
  if (!menu) return;
  menu.classList.toggle('show');
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', closeAvatarActionsOnce, { once: true });
  }, 0);
}
function closeAvatarActionsOnce() {
  const menu = document.getElementById('hofAvatarActions');
  if (menu) menu.classList.remove('show');
}

function uploadAvatar() {
  closeAvatarActionsOnce();
  document.getElementById('hofAvatarFile').click();
}

function handleAvatarUpload(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    if (typeof showToast === 'function') showToast('Please pick an image', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    // Compress a touch: draw to 256x256 canvas and re-encode as JPEG 0.85
    const img = new Image();
    img.onload = () => {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Center-crop to square
      const src = Math.min(img.width, img.height);
      const sx = (img.width - src) / 2;
      const sy = (img.height - src) / 2;
      ctx.drawImage(img, sx, sy, src, src, 0, 0, size, size);
      const compressed = canvas.toDataURL('image/jpeg', 0.85);
      try {
        localStorage.setItem(LS_AVATAR, compressed);
        // Refresh avatar display in place
        const av = document.getElementById('hofAvatar');
        if (av) av.innerHTML = '<img src="' + compressed + '" alt="">';
        // Re-render the actions menu to include delete option
        const menu = document.getElementById('hofAvatarActions');
        if (menu) {
          menu.innerHTML = `
            <button class="hof-avatar-action" onclick="uploadAvatar()">
              <svg viewBox="0 0 16 16"><path d="M2 10v3h12v-3M8 11V2M4 6l4-4 4 4"/></svg>
              Change photo
            </button>
            <button class="hof-avatar-action" onclick="openAvatarLightbox()">
              <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
              View full size
            </button>
            <button class="hof-avatar-action danger" onclick="deleteAvatar()">
              <svg viewBox="0 0 16 16"><path d="M3 4h10M6 4V2h4v2M5 4v10h6V4"/></svg>
              Remove photo
            </button>`;
        }
        if (typeof showToast === 'function') showToast('Photo updated', 'success');
      } catch (err) {
        if (typeof showToast === 'function') showToast('Could not save (image too large?)', 'error');
      }
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
  // Reset file input so uploading the same file again still fires change
  e.target.value = '';
}

function deleteAvatar() {
  closeAvatarActionsOnce();
  if (!confirm('Remove your profile photo?')) return;
  localStorage.removeItem(LS_AVATAR);
  const av = document.getElementById('hofAvatar');
  if (av) av.innerHTML = '<div class="hof-avatar-ini">' + initials(scoutName) + '</div>';
  const menu = document.getElementById('hofAvatarActions');
  if (menu) {
    menu.innerHTML = `
      <button class="hof-avatar-action" onclick="uploadAvatar()">
        <svg viewBox="0 0 16 16"><path d="M2 10v3h12v-3M8 11V2M4 6l4-4 4 4"/></svg>
        Upload photo
      </button>`;
  }
  if (typeof showToast === 'function') showToast('Photo removed', 'success');
}

function openAvatarLightbox() {
  closeAvatarActionsOnce();
  const avatar = localStorage.getItem(LS_AVATAR);
  if (!avatar) return;
  const lb = document.getElementById('hofLightbox');
  const img = document.getElementById('hofLightboxImg');
  if (img) img.src = avatar;
  if (lb) lb.classList.add('open');
}
function closeAvatarLightbox() {
  const lb = document.getElementById('hofLightbox');
  if (lb) lb.classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAvatarLightbox();
});

// ── ACHIEVEMENTS ────────────────────────────────────────────────
function dismissAchievement(id) {
  let dismissed = [];
  try { dismissed = JSON.parse(localStorage.getItem(LS_DISMISSED_ACH) || '[]'); } catch(e) {}
  if (!dismissed.includes(id)) dismissed.push(id);
  localStorage.setItem(LS_DISMISSED_ACH, JSON.stringify(dismissed));
  // Remove the card from view with a quick fade
  const cards = document.querySelectorAll('.hof-achieve');
  cards.forEach(c => {
    const btn = c.querySelector('.hof-achieve-dismiss');
    if (btn && btn.getAttribute('onclick') && btn.getAttribute('onclick').indexOf(id) !== -1) {
      c.style.transition = 'opacity 0.2s, transform 0.2s';
      c.style.opacity = '0';
      c.style.transform = 'translateX(20px)';
      setTimeout(() => c.remove(), 200);
    }
  });
}

// ── SHARE ───────────────────────────────────────────────────────
function shareSeason() {
  const text = document.querySelector('.hof-wrap-text');
  if (!text) return;
  // Convert HTML to plain text
  const tmp = document.createElement('div');
  tmp.innerHTML = text.innerHTML;
  const plain = tmp.textContent || tmp.innerText || '';
  const message = `${firstName}'s ${viewSeason} Scouting Season\n\n${plain}\n\n— via BTID`;
  if (navigator.share) {
    navigator.share({ title: 'My ' + viewSeason + ' Season', text: message }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(message).then(() => {
      if (typeof showToast === 'function') showToast('Season summary copied to clipboard', 'success');
    });
  } else {
    alert(message);
  }
}

async function loadHallOfFame() {
  try {
    const [playersRes, batchesRes] = await Promise.all([
      PlayerAPI.getAll().catch(() => []),
      TryoutAPI.getAll().catch(() => []),
    ]);
    const players = toArray(playersRes);
    const batches = toArray(batchesRes);

    const html = [
      renderBanner(players),
      renderLifetime(players),
      renderMetrics(players, batches),
      renderOnThisDay(players),
      renderAchievements(players, batches),
      renderBadges(players, batches),
      renderDiscoveryReel(players),
      renderMoment(players),
      renderRecentAdmits(players),
      renderDistricts(players),
      renderVelocityChart(players),
      renderRhythm(players),
      renderGoals(players, batches),
      renderHomeVisits(players),
      renderRecords(players),
      renderStreak(players),
      renderWrapUp(players),
      renderQuote(),
    ].join('');

    document.getElementById('hofLoading').style.display = 'none';
    const content = document.getElementById('hofContent');
    content.innerHTML = html;
    content.style.display = 'block';

    // Update topbar sub
    const admitted = players.filter(p => p.outcome === 'admitted').length;
    document.getElementById('hofTopSub').textContent =
      `${admitted} admitted · ${players.length} total · ${viewSeason} season`;

    // Post-render wiring
    runCountUps();
    animateProgressBars();
    wireFilterBar();
    wireDistrictHover();
    wireChartTooltips();
    wireAheadTooltips();
    wireBannerSpotlight();
    wireSeasonSelector();
    initBadgesCollapsed();
    wireBadgeTooltips();
  } catch (e) {
    document.getElementById('hofLoading').innerHTML =
      'Could not load Hall of Fame. ' + (e.message || 'Please try again.');
  }
}

// Reload on season change (from the selector)
window.addEventListener('seasonChanged', () => window.location.reload());

loadHallOfFame();
