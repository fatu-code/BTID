<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTID — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --green:#005A9C; --green-dark:#003A6B; --green-light:#b3d4f0;
  --green-pale:#e6f0fa; --green-mid:rgba(0,90,156,0.15);
  --green-shadow:rgba(0,90,156,0.3);
  --deeper:#001A3A; --dark:#00254D;
  --bg:#f4f7fb; --white:#fff; --border:#d8e4f0;
  --text:#00254D; --muted:#5B7A96;
  --red:#e05252; --red-pale:#fdeaea;
  --font1:'Varela Round',sans-serif; --font2:'Nunito',sans-serif;
  --radius:14px; --radius-sm:9px;
}
html,body{height:100%}
body{font-family:var(--font2);background:var(--deeper);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

/* Background pattern */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 50%, rgba(0,156,65,0.08) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 20%, rgba(0,156,65,0.05) 0%, transparent 50%);
  pointer-events:none;
}

.login-wrap{
  width:100%;max-width:420px;
  position:relative;z-index:1;
}

/* Brand */
.login-brand{
  text-align:center;
  margin-bottom:28px;
}
.brand-circle{
  width:64px;height:64px;
  background:var(--green);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;
  box-shadow:0 8px 28px var(--green-shadow);
}
.brand-circle svg{
  width:30px;height:30px;
  stroke:#fff;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
}
.brand-title{
  font-family:var(--font1);
  font-size:1.8rem;
  color:#fff;
  letter-spacing:-0.02em;
  margin-bottom:4px;
}
.brand-sub{
  font-family:var(--font2);
  font-size:0.75rem;
  font-weight:600;
  color:rgba(255,255,255,0.35);
}

/* Card */
.login-card{
  background:var(--white);
  border-radius:var(--radius);
  padding:28px 28px 24px;
  box-shadow:0 24px 60px rgba(0,0,0,0.4);
}

.card-title{
  font-family:var(--font1);
  font-size:1.1rem;
  color:var(--text);
  margin-bottom:4px;
}
.card-sub{
  font-family:var(--font2);
  font-size:0.72rem;
  font-weight:600;
  color:var(--muted);
  margin-bottom:22px;
}

.form-group{margin-bottom:14px}
.form-label{
  display:block;
  font-family:var(--font2);
  font-size:0.62rem;font-weight:800;
  color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;
  margin-bottom:5px;
}
.form-input{
  width:100%;height:44px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:var(--font2);font-size:0.88rem;font-weight:600;
  color:var(--text);padding:0 14px;
  outline:none;transition:border-color .15s;
}
.form-input:focus{
  border-color:var(--green);
  background:var(--white);
  box-shadow:0 0 0 3px var(--green-mid);
}

.submit-btn{
  width:100%;height:46px;
  background:var(--green);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-family:var(--font2);font-size:0.88rem;font-weight:800;
  cursor:pointer;transition:all .15s;
  margin-top:4px;
  box-shadow:0 4px 14px var(--green-shadow);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 6px 20px var(--green-shadow)}
.submit-btn:disabled{opacity:.6;cursor:default;transform:none}
.submit-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* Error */
.error-box{
  background:var(--red-pale);
  border:1.5px solid rgba(224,82,82,0.25);
  border-radius:var(--radius-sm);
  padding:10px 13px;
  font-family:var(--font2);font-size:0.78rem;font-weight:700;
  color:var(--red);
  margin-bottom:14px;
  display:none;
  align-items:center;gap:8px;
}
.error-box.show{display:flex}

/* Footer */
.login-footer{
  text-align:center;
  margin-top:18px;
  font-family:var(--font2);
  font-size:0.65rem;font-weight:600;
  color:rgba(255,255,255,0.2);
}

/* Spinner */
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.35);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Expired modal */
.expired-screen{
  text-align:center;
  display:none;
}
.expired-icon{
  width:60px;height:60px;
  background:rgba(224,82,82,0.12);
  border:1.5px solid rgba(224,82,82,0.25);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.expired-icon svg{width:26px;height:26px;stroke:var(--red);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.expired-title{font-family:var(--font1);font-size:1.1rem;color:var(--text);margin-bottom:6px}
.expired-sub{font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--muted);line-height:1.6;margin-bottom:18px}
.back-btn{
  background:none;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 20px;
  font-family:var(--font2);font-size:0.78rem;font-weight:800;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.back-btn:hover{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>
<div class="login-wrap">
  <!-- Brand -->
  <div class="login-brand">
    <div class="brand-circle">
      <svg viewBox="0 0 16 16">
        <circle cx="8" cy="8" r="5.5"/>
        <path d="M2.5 5.5c2.5 1.5 6 1.5 11-1.5"/>
        <path d="M2 9c2.5-1.5 7-1.5 12 1.5"/>
      </svg>
    </div>
    <div class="brand-title">BTID</div>
    <div class="brand-sub">Baseball Talent Identification &amp; Development</div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Normal login form -->
    <div id="loginForm">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to the Athlete Management System</div>

      <div class="error-box" id="errorBox">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3"/><circle cx="8" cy="11" r=".5" fill="currentColor"/></svg>
        <span id="errorMsg">Invalid username or password</span>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="username"
          placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password"
          placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button class="submit-btn" id="submitBtn" onclick="doLogin()">
        <svg viewBox="0 0 16 16"><path d="M6 8h7M10 5l3 3-3 3"/><path d="M4 4H2a1 1 0 00-1 1v6a1 1 0 001 1h2"/></svg>
        Sign In
      </button>
    </div>

    <!-- Expired access screen -->
    <div class="expired-screen" id="expiredScreen">
      <div class="expired-icon">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      </div>
      <div class="expired-title">Access Expired</div>
      <div class="expired-sub">
        Your scout access has expired.<br>
        Please contact <strong>Joshua</strong> to renew your access.
      </div>
      <button class="back-btn" onclick="showLogin()">Back to Sign In</button>
    </div>
  </div>

  <div class="login-footer">BTID Athlete Management System &nbsp;·&nbsp; LA Dodgers Africa</div>
</div>

<script src="api.js"></script>
<script>
// Redirect if already logged in
if (Auth.get()) window.location.href = 'dashboard.html';

const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');
const errorBox   = document.getElementById('errorBox');
const errorMsg   = document.getElementById('errorMsg');
const submitBtn  = document.getElementById('submitBtn');

// Allow enter key
[usernameEl, passwordEl].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
);

function showError(msg) {
  errorMsg.textContent = msg;
  errorBox.classList.add('show');
}
function hideError() { errorBox.classList.remove('show'); }

function showLogin() {
  document.getElementById('loginForm').style.display = '';
  document.getElementById('expiredScreen').style.display = 'none';
}

function showExpired() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('expiredScreen').style.display = 'block';
}

async function doLogin() {
  const username = usernameEl.value.trim();
  const password = passwordEl.value;

  if (!username || !password) {
    showError('Please enter your username and password.');
    return;
  }

  hideError();
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div> Signing in...';

  try {
    const data = await apiFetch('/api/login', {
      method: 'POST',
      body: { username, password },
    });

    // Check if scout account has expired
    if (data.user.role === 'scout' && data.user.active_until) {
      const expiry = new Date(data.user.active_until);
      if (expiry < new Date()) {
        showExpired();
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M6 8h7M10 5l3 3-3 3"/><path d="M4 4H2a1 1 0 00-1 1v6a1 1 0 001 1h2"/></svg>Sign In';
        return;
      }
    }

    Auth.set(data.user, data.token);
    window.location.href = 'dashboard.html';
  } catch (err) {
    showError(err.message || 'Invalid username or password.');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M6 8h7M10 5l3 3-3 3"/><path d="M4 4H2a1 1 0 00-1 1v6a1 1 0 001 1h2"/></svg>Sign In';
  }
}
</script>
</body>
</html>
