<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Player Profile — BTID</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#005A9C; --blue-dark:#003A6B; --blue-light:#b3d4f0;
  --blue-pale:#e6f0fa; --blue-mid:rgba(0,90,156,0.15);
  --red:#EF3E42; --red-pale:#fde8e8;
  --green:#009c41; --green-pale:#e8f5ee;
  --amber:#f5a623; --amber-pale:#fef3dc;
  --bg:#f4f7fb; --white:#fff; --border:#d8e4f0;
  --text:#00254D; --muted:#5B7A96;
  --font1:'Varela Round',sans-serif; --font2:'Nunito',sans-serif;
  --radius:14px; --radius-sm:9px;
}
body{font-family:var(--font2);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* Header */
.page-header{
  background:var(--blue-dark);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-brand{display:flex;align-items:center;gap:8px}
.header-logo{
  width:32px;height:32px;border-radius:8px;
  background:var(--blue);border:1.5px solid rgba(179,212,240,0.3);
  display:flex;align-items:center;justify-content:center;
}
.header-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.header-name{font-family:var(--font1);font-size:1rem;color:#fff}
.header-tag{font-family:var(--font2);font-size:0.6rem;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.08em}
.expiry-pill{
  font-family:var(--font2);font-size:0.65rem;font-weight:700;
  color:rgba(255,255,255,0.45);
  background:rgba(255,255,255,0.08);
  padding:4px 10px;border-radius:100px;
}

/* Content */
.container{max-width:900px;margin:0 auto;padding:20px 16px}

/* Hero */
.hero{
  background:var(--blue-dark);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:14px;
  color:#fff;
}
.hero-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px}
.hero-photo{
  width:72px;height:72px;border-radius:12px;
  background:var(--blue);border:2px solid rgba(179,212,240,0.25);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font1);font-size:1.4rem;color:var(--blue-light);
  flex-shrink:0;overflow:hidden;
}
.hero-photo img{width:100%;height:100%;object-fit:cover}
.hero-name{font-family:var(--font1);font-size:1.4rem;letter-spacing:-.02em;margin-bottom:3px}
.hero-school{font-family:var(--font2);font-size:0.78rem;font-weight:700;color:var(--blue-light);margin-bottom:6px}
.hero-meta{display:flex;gap:12px;flex-wrap:wrap}
.hero-meta-item{font-family:var(--font2);font-size:0.68rem;font-weight:600;color:rgba(255,255,255,0.45)}
.hero-meta-item strong{color:rgba(255,255,255,0.85);font-weight:800}
.hero-stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:1px;background:rgba(255,255,255,0.08);
  border-radius:10px;overflow:hidden;
}
.hs{background:rgba(255,255,255,0.04);padding:10px;text-align:center}
.hs-val{font-family:var(--font1);font-size:1.2rem;color:#fff;line-height:1;margin-bottom:2px}
.hs-lbl{font-family:var(--font2);font-size:0.58rem;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.07em}

/* Tabs */
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:10px 16px;font-family:var(--font2);font-size:0.78rem;font-weight:800;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Cards */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-family:var(--font2);font-size:0.82rem;font-weight:800;color:var(--text);margin-bottom:12px}

/* Info rows */
.info-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-lbl{font-family:var(--font2);font-size:0.68rem;font-weight:700;color:var(--muted)}
.info-val{font-family:var(--font2);font-size:0.78rem;font-weight:800;color:var(--text);text-align:right;max-width:60%}

/* Tier badge */
.tier-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:7px;font-family:var(--font1);font-size:0.7rem;font-weight:700;color:#fff}

/* Metric boxes */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.metric-box{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.mb-lbl{font-family:var(--font2);font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:3px}
.mb-val{font-family:var(--font1);font-size:1.5rem;color:var(--text);line-height:1;margin-bottom:2px}
.mb-unit{font-family:var(--font2);font-size:0.6rem;font-weight:700;color:var(--muted)}
.mb-attempts{display:flex;gap:4px;justify-content:center;margin-top:5px}
.mb-attempt{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:var(--font1);font-size:0.65rem;color:var(--text)}

/* Media */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.media-thumb{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);border:1.5px solid var(--border);cursor:pointer}
.media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover}

/* Comments */
.comment{display:flex;align-items:flex-start;gap:9px;padding:10px 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.comment-ava{width:28px;height:28px;border-radius:50%;background:var(--blue-dark);display:flex;align-items:center;justify-content:center;font-family:var(--font1);font-size:0.62rem;color:var(--blue-light);flex-shrink:0}
.comment-author{font-family:var(--font2);font-size:0.72rem;font-weight:800;color:var(--text);margin-bottom:2px}
.comment-time{font-family:var(--font2);font-size:0.6rem;font-weight:600;color:var(--muted);margin-left:6px}
.comment-body{font-family:var(--font2);font-size:0.75rem;font-weight:600;color:var(--text);line-height:1.6}

/* Pill */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-family:var(--font2);font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.pill-green{background:var(--green-pale);color:#007a33;border:1px solid rgba(0,156,65,0.2)}
.pill-red{background:var(--red-pale);color:var(--red);border:1px solid rgba(239,62,66,0.2)}
.pill-amber{background:var(--amber-pale);color:#9a6000;border:1px solid rgba(245,166,35,0.2)}
.pill-muted{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* Expired / Error screens */
.full-screen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.fs-icon{width:64px;height:64px;border-radius:50%;background:var(--blue-pale);border:1.5px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.fs-icon svg{width:28px;height:28px;stroke:var(--blue);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.fs-title{font-family:var(--font1);font-size:1.3rem;color:var(--text);margin-bottom:6px}
.fs-sub{font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--muted);line-height:1.6;max-width:300px}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain}

/* Footer */
.page-footer{text-align:center;padding:24px 16px;font-family:var(--font2);font-size:0.65rem;font-weight:600;color:var(--muted)}

@media(max-width:600px){
  .hero-top{flex-direction:column}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <div class="header-brand">
    <div class="header-logo">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5"/><path d="M2.5 5.5c2.5 1.5 6 1.5 11-1.5"/><path d="M2 9c2.5-1.5 7-1.5 12 1.5"/></svg>
    </div>
    <div>
      <div class="header-name">BTID</div>
      <div class="header-tag">Athlete Management · LA Dodgers Africa</div>
    </div>
  </div>
  <div class="expiry-pill" id="expiryLabel">Loading...</div>
</div>

<!-- Main content -->
<div class="container" id="mainContent">
  <div class="full-screen">
    <div class="fs-icon"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg></div>
    <div class="fs-title">Loading profile...</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<div class="page-footer">BTID Athlete Management System · LA Dodgers Africa Development Program · This link is confidential</div>

<script>
const API_BASE = 'https://btid-backend-production.up.railway.app';
const token    = new URLSearchParams(window.location.search).get('token');

function initials(name) {
  if (!name) return '?';
  return name.trim().split(' ').filter(Boolean).map(w => w[0].toUpperCase()).slice(0,2).join('');
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-UG', { day:'numeric', month:'short', year:'numeric' });
}

function formatDateFull(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-UG', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function calcAge(dob) {
  if (!dob) return null;
  const today = new Date(); const birth = new Date(dob);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

function tierBadge(tier) {
  if (!tier) return '';
  const colors = { '1':'#009c41','1.5':'#7dbf3a','2':'#f5a623','3':'#e53935' };
  const c = colors[String(tier)] || '#999';
  const label = tier === '1.5' ? 'T1.5' : 'T' + tier;
  return `<span class="tier-badge" style="background:${c}">${label}</span>`;
}

function outcomePill(o) {
  if (!o) return '';
  if (o === 'admitted')   return '<span class="pill pill-green">Admitted</span>';
  if (o === 'eliminated') return '<span class="pill pill-red">Eliminated</span>';
  return '';
}

function statBox(label, avg, unit, a1, a2, a3) {
  const attempts = [a1, a2, a3].filter(v => v != null && v !== '');
  return `
    <div class="metric-box">
      <div class="mb-lbl">${label}</div>
      <div class="mb-val">${avg || '—'}</div>
      <div class="mb-unit">${unit}</div>
      ${attempts.length ? `<div class="mb-attempts">${attempts.map(a => `<div class="mb-attempt">${a}</div>`).join('')}</div>` : ''}
    </div>`;
}

function singleBox(label, val, unit) {
  return `
    <div class="metric-box">
      <div class="mb-lbl">${label}</div>
      <div class="mb-val">${val || '—'}</div>
      <div class="mb-unit">${unit}</div>
    </div>`;
}

function infoRow(label, value) {
  return `
    <div class="info-row">
      <span class="info-lbl">${label}</span>
      <span class="info-val">${value || '—'}</span>
    </div>`;
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id)?.classList.add('active');
  btn.classList.add('active');
}

function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

async function load() {
  if (!token) {
    showError('Invalid link', 'This link is invalid or has been removed.');
    return;
  }

  try {
    const res  = await fetch(API_BASE + '/api/shared/' + token);
    const data = await res.json();

    if (!res.ok) {
      if (data.error === 'LINK_EXPIRED') {
        showExpired();
      } else {
        showError('Link not found', 'This link is invalid or has been removed.');
      }
      return;
    }

    const { player: p, tryout_result: r, home_visit: hv, comments, expires_at } = data;

    // Expiry label
    const expDate = new Date(expires_at);
    const diff    = Math.ceil((expDate - new Date()) / 3600000);
    document.getElementById('expiryLabel').textContent =
      diff > 24
        ? 'Expires ' + formatDate(expires_at)
        : 'Expires in ' + diff + ' hour' + (diff !== 1 ? 's' : '');

    const age = calcAge(p.dob) || p.age || '?';
    const velo  = r?.velo_st_avg  || p.velo  || '—';
    const broad = r?.broad_avg    || '—';
    const dash  = r?.dash_avg     || '—';

    document.getElementById('mainContent').innerHTML = `
      <!-- HERO -->
      <div class="hero">
        <div class="hero-top">
          <div class="hero-photo">
            ${p.photo_url
              ? `<img src="${API_BASE}${p.photo_url}" alt="${p.name}">`
              : initials(p.name)}
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-family:var(--font2);font-size:0.62rem;font-weight:800;color:var(--blue-light);text-transform:uppercase;letter-spacing:.1em">${p.class||'—'}</span>
              ${tierBadge(p.tier)}
              ${outcomePill(p.outcome)}
            </div>
            <div class="hero-name">${p.name}</div>
            <div class="hero-school">${p.school || '—'}</div>
            <div class="hero-meta">
              <div class="hero-meta-item">Age <strong>${age}</strong></div>
              <div class="hero-meta-item">DOB <strong>${formatDate(p.dob)}</strong></div>
              <div class="hero-meta-item">District <strong>${p.district || '—'}</strong></div>
              <div class="hero-meta-item">Scout <strong>${p.scout || 'Joshua M.'}</strong></div>
              ${p.gphp ? `<div class="hero-meta-item">GPHP <strong>${p.gphp}cm</strong></div>` : ''}
            </div>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hs"><div class="hs-val">${velo}</div><div class="hs-lbl">Velo (mph)</div></div>
          <div class="hs"><div class="hs-val">${broad}</div><div class="hs-lbl">Broad (in)</div></div>
          <div class="hs"><div class="hs-val">${dash}</div><div class="hs-lbl">30yd Dash</div></div>
          <div class="hs"><div class="hs-val">${p.height_ft || '—'}</div><div class="hs-lbl">Height</div></div>
          <div class="hs"><div class="hs-val">${p.weight_lbs || '—'}</div><div class="hs-lbl">Weight (lbs)</div></div>
          ${r?.overall_grade ? `<div class="hs"><div class="hs-val">${r.overall_grade}</div><div class="hs-lbl">Scout Grade</div></div>` : ''}
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="showTab('profile',this)">Profile</button>
        <button class="tab" onclick="showTab('homevisit',this)">Home Visit</button>
        <button class="tab" onclick="showTab('tryout',this)">Final Tryout</button>
        <button class="tab" onclick="showTab('posttryout',this)">Post Tryout</button>
      </div>

      <!-- TAB 1: PROFILE -->
      <div class="tab-content active" id="tab-profile">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="card">
            <div class="card-title">Player Information</div>
            ${infoRow('Full Name', p.name)}
            ${infoRow('Date of Birth', formatDate(p.dob))}
            ${infoRow('Age', age + ' years')}
            ${infoRow('Class', p.class)}
            ${infoRow('Gender', p.gender)}
            ${infoRow('Nationality', p.nationality)}
            ${infoRow('Household ID', p.household_id)}
            ${infoRow('Refugee ID', p.refugee_id)}
          </div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="card">
              <div class="card-title">School & Location</div>
              ${infoRow('School', p.school)}
              ${infoRow('District', p.district)}
              ${infoRow('Division', p.division)}
              ${infoRow('Scout', p.scout)}
            </div>
            <div class="card">
              <div class="card-title">Genetics</div>
              ${infoRow('Dad Height', p.dad_ht ? p.dad_ht + ' cm' : '—')}
              ${infoRow('Mom Height', p.mom_ht ? p.mom_ht + ' cm' : '—')}
              ${infoRow('GPHP', p.gphp ? p.gphp + ' cm' : '—')}
            </div>
          </div>
        </div>

        <!-- Comments -->
        ${comments && comments.length ? `
        <div class="card" style="margin-top:0">
          <div class="card-title">Scout Comments</div>
          ${comments.map(c => `
            <div class="comment">
              <div class="comment-ava">${initials(c.author_name)}</div>
              <div>
                <div class="comment-author">${c.author_name}
                  <span class="comment-time">${formatDate(c.created_at)}</span>
                </div>
                <div class="comment-body">${c.text}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}
      </div>

      <!-- TAB 2: HOME VISIT -->
      <div class="tab-content" id="tab-homevisit">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="card">
            <div class="card-title">Home Visit Notes</div>
            <p style="font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--text);line-height:1.8">
              ${hv?.notes || '<span style="color:var(--muted)">No notes recorded.</span>'}
            </p>
            ${hv?.visit_date ? `<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
              ${infoRow('Visit Date', formatDate(hv.visit_date))}
              ${infoRow('Visited by', hv.visited_by)}
              ${infoRow('Family size', hv.family_size)}
              ${infoRow('Guardian consent', hv.consent ? 'Yes ✓' : 'Pending')}
            </div>` : ''}
          </div>
          <div class="card">
            <div class="card-title">Photos & Videos</div>
            ${hv?.media && hv.media.length ? `
            <div class="media-grid">
              ${hv.media.map(m => `
                <div class="media-thumb" onclick="${m.type === 'image' ? `openLightbox('${API_BASE}${m.url}')` : ''}">
                  ${m.type === 'image'
                    ? `<img src="${API_BASE}${m.url}" loading="lazy">`
                    : `<video src="${API_BASE}${m.url}" preload="metadata" controls></video>`}
                </div>`).join('')}
            </div>` : `<div style="font-family:var(--font2);font-size:0.72rem;color:var(--muted)">No media uploaded.</div>`}
          </div>
        </div>
      </div>

      <!-- TAB 3: FINAL TRYOUT -->
      <div class="tab-content" id="tab-tryout">
        ${r ? `
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div class="card-title" style="margin-bottom:0">Tryout Metrics</div>
            ${r.tier ? tierBadge(r.tier) : ''}
          </div>
          <div class="metric-grid">
            ${statBox('30yd Dash', r.dash_avg, 'sec avg', r.dash_1, r.dash_2)}
            ${statBox('Broad Jump', r.broad_avg, 'in avg', r.broad_1, r.broad_2, r.broad_3)}
            ${statBox('Velo (Standing)', r.velo_st_avg, 'mph avg', r.velo_st_1, r.velo_st_2)}
            ${statBox('Velo (Pitching)', r.velo_pd_avg, 'mph avg', r.velo_pd_1, r.velo_pd_2)}
            ${singleBox('Height', r.height_ft, 'ft')}
            ${singleBox('Weight', r.weight_lbs, 'lbs')}
            ${singleBox('ER', r.er, '')}
            ${r.overall_grade ? singleBox('Scout Grade', r.overall_grade, '/ 10') : ''}
          </div>
          ${r.scout_notes ? `
          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-top:4px">
            <div style="font-family:var(--font2);font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px">Scout Notes</div>
            <div style="font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--text);line-height:1.7">${r.scout_notes}</div>
          </div>` : ''}
        </div>` : `
        <div style="text-align:center;padding:40px 20px;font-family:var(--font2);font-size:0.78rem;color:var(--muted)">
          No tryout metrics recorded yet.
        </div>`}
      </div>

      <!-- TAB 4: POST TRYOUT -->
      <div class="tab-content" id="tab-posttryout">
        <div class="card">
          <div class="card-title">Post Tryout Status</div>
          ${infoRow('Outcome', p.outcome ? p.outcome.charAt(0).toUpperCase()+p.outcome.slice(1) : 'Pending')}
          ${infoRow('Academy', p.academy)}
          ${infoRow('Coach Assigned', p.coach_assigned)}
          ${infoRow('Next Check-in', p.next_checkin ? formatDate(p.next_checkin) : '—')}
          ${infoRow('Guardian Consent', p.guardian_consent ? 'Confirmed ✓' : 'Pending')}
        </div>
        ${p.dev_notes ? `
        <div class="card">
          <div class="card-title">Development Notes</div>
          <p style="font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--text);line-height:1.8">${p.dev_notes}</p>
        </div>` : ''}
        ${p.elimination_reason ? `
        <div class="card" style="border-color:rgba(239,62,66,0.2)">
          <div class="card-title" style="color:var(--red)">Elimination Reasons</div>
          <p style="font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--text);line-height:1.8">${p.elimination_reason}</p>
        </div>` : ''}
      </div>`;

  } catch(e) {
    showError('Error loading profile', 'Something went wrong. Please try again.');
  }
}

function showExpired() {
  document.getElementById('expiryLabel').textContent = 'Link expired';
  document.getElementById('mainContent').innerHTML = `
    <div class="full-screen">
      <div class="fs-icon" style="background:var(--red-pale);border-color:rgba(239,62,66,0.2)">
        <svg viewBox="0 0 16 16" style="stroke:var(--red)"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      </div>
      <div class="fs-title">This link has expired</div>
      <div class="fs-sub">This player profile link is no longer active. Please contact Joshua Muwanguzi to request a new link.</div>
    </div>`;
}

function showError(title, msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="full-screen">
      <div class="fs-icon">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3"/><circle cx="8" cy="11" r=".5" fill="var(--blue)"/></svg>
      </div>
      <div class="fs-title">${title}</div>
      <div class="fs-sub">${msg}</div>
    </div>`;
}

load();
</script>
</body>
</html>
