<!DOCTYPE html>
<!-- BTID Profile v25 -->

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Player Profile — BTID</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
/* Metric display bars (tryout tab) */
.tryout-stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.tryout-stat-box {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.tsb-label {
  font-family: var(--font2);
  font-size: 0.58rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--muted);
  margin-bottom: 4px;
}
.tsb-val {
  font-family: var(--font1);
  font-size: 1.5rem;
  color: var(--text);
  line-height: 1;
  margin-bottom: 2px;
}
.tsb-unit {
  font-family: var(--font2);
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--muted);
}
.tsb-attempts {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-top: 6px;
}
.tsb-attempt {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 7px;
  font-family: var(--font1);
  font-size: 0.68rem;
  color: var(--text);
}
/* Media grid (home visit) */
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
  gap: 8px;
  margin-bottom: 12px;
}
.media-thumb {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg);
  border: 1.5px solid var(--border);
  position: relative;
  cursor: pointer;
}
.media-thumb img, .media-thumb video {
  width:100%;height:100%;object-fit:cover;
}
.media-del {
  position: absolute;top:4px;right:4px;
  width:20px;height:20px;
  background:rgba(0,0,0,.6);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.65rem;cursor:pointer;
  opacity:0;transition:opacity .15s;
  border:none;
}
.media-thumb:hover .media-del { opacity:1; }
.media-type-icon {
  position:absolute;bottom:4px;left:4px;
  background:rgba(0,0,0,.5);
  border-radius:4px;
  padding:2px 5px;
  font-size:.55rem;color:#fff;font-weight:700;font-family:var(--font2);
}
/* Upload area */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  background: var(--bg);
}
.upload-area:hover { border-color:var(--green); background:var(--green-pale); }
.upload-area input { display:none; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <a href="players.html" style="font-family:var(--font2);font-size:0.7rem;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:4px;text-decoration:none;margin-bottom:1px">
            <svg viewBox="0 0 16 16" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M10 4l-4 4 4 4"/></svg>
            Players
          </a>
          <div class="topbar-title" id="profileNameBar">Loading...</div>
        </div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>

    <div class="content" id="profileContent">
      <div class="empty-state"><div class="empty-title">Loading profile...</div></div>
    </div>
  </div>
</div>

<!-- Photo lightbox -->
<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out" onclick="closeLightbox()">
  <img id="lightboxImg" style="max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain">
</div>

<!-- Elimination modal -->
<div class="modal-bg" id="eliminateModal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title">Elimination Reason</div>
      <button class="modal-close" onclick="document.getElementById('eliminateModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:14px">Select all reasons that apply:</p>
      <div id="eliminationReasons"></div>
      <div class="form-group" style="margin-top:12px">
        <label class="form-label">Additional notes</label>
        <textarea class="form-textarea" id="eliminationNotes" rows="2" placeholder="Any additional notes..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="document.getElementById('eliminateModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-red" onclick="confirmElimination()">Confirm Elimination</button>
    </div>
  </div>
</div>

<input type="file" id="photoUploadInput" accept="image/*" style="display:none">

<script src="api.js"></script>
<script src="js/app.js"></script>
<script>
const user    = Auth.require();
const level   = getRoleLevel(user.role);
const playerId = new URLSearchParams(window.location.search).get('id');
const isAdmin  = level >= 2;

buildSidebar('players');

if (!playerId) { window.location.href = 'players.html'; }

let player = null;
let homeVisit = null;
let comments  = [];
let tryoutResult = null;

const ELIMINATION_REASONS = [
  'Insufficient speed',
  'Weak arm strength',
  'Poor hitting mechanics',
  'Poor fielding mechanics',
  'Physical size / development not yet ready',
  'Low baseball understanding or game awareness',
  'Attitude / coachability concerns',
  'Injury or medical concern',
  'Age ineligible',
  'Did not attend tryout',
  'Other',
];

// Build elimination checkboxes
document.getElementById('eliminationReasons').innerHTML =
  ELIMINATION_REASONS.map((r, i) => `
    <label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--text)">
      <input type="checkbox" id="er_${i}" value="${r}"
        style="width:16px;height:16px;accent-color:var(--red)">
      ${r}
    </label>`).join('');

async function loadProfile() {
  try {
    const [playerRes, hvRes, commRes] = await Promise.allSettled([
      PlayerAPI.get(playerId),
      HomeVisitAPI.get(playerId),
      CommentAPI.get(playerId),
    ]);

    player    = playerRes.status   === 'fulfilled' ? (playerRes.value.player   || playerRes.value) : null;
    homeVisit = hvRes.status       === 'fulfilled' ? (hvRes.value.home_visit   || hvRes.value)     : {};
    comments  = commRes.status     === 'fulfilled' ? (commRes.value.comments   || commRes.value || []) : [];

    if (!player) {
      document.getElementById('profileContent').innerHTML =
        '<div class="empty-state"><div class="empty-title">Player not found.</div></div>';
      return;
    }

    renderProfile();
  } catch(e) {
    document.getElementById('profileContent').innerHTML =
      `<div class="empty-state"><div class="empty-title">Error loading profile.</div></div>`;
  }
}

function renderProfile() {
  const age = calcAge(player.dob) || player.age || '?';
  document.getElementById('profileNameBar').textContent = player.name;

  // Topbar actions
  if (isAdmin) {
    document.getElementById('topbarActions').innerHTML = `
      <button class="btn btn-outline mob-hide" onclick="editPlayer()">
        <svg viewBox="0 0 16 16"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>
        Edit
      </button>
      <button class="btn btn-outline" onclick="openShareModal()">
        <svg viewBox="0 0 16 16"><circle cx="12" cy="4" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="12" cy="12" r="2"/><path d="M6 7l4-2M6 9l4 2"/></svg>
        <span class="mob-hide">Share</span>
      </button>
      <button class="btn btn-green" onclick="exportPDF()">
        <svg viewBox="0 0 16 16"><rect x="3" y="1" width="10" height="14" rx="1.5"/><path d="M6 5h4M6 8h4M6 11h2"/></svg>
        <span class="mob-hide">Export PDF</span>
      </button>`;
  }

  const velo = player.velo || tryoutResult?.velo_st_avg || '—';
  const broad = tryoutResult?.broad_avg || player.broad || '—';
  const dash  = tryoutResult?.dash_avg  || '—';

  document.getElementById('profileContent').innerHTML = `
    <!-- HERO (Mookie Betts style) -->
    <div class="profile-hero" style="margin-bottom:14px">
      <div class="profile-hero-top">
        <!-- Photo -->
        <div class="profile-photo-wrap" id="photoWrap" ${isAdmin ? 'onclick="triggerPhotoUpload()"' : ''}>
          ${player.photo_url
            ? `<img src="${player.photo_url.startsWith('http') ? player.photo_url : API_BASE + player.photo_url}" alt="${player.name}" id="profilePhoto" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`
            : `<div class="profile-photo-initials" id="profilePhoto">${initials(player.name)}</div>`}
          ${isAdmin ? `<div class="photo-edit-hint" style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-family:var(--font2);font-size:0.6rem;font-weight:700;text-align:center;padding:4px;cursor:pointer">
            ${player.photo_url ? '📷 Change' : '📷 Add Photo'}
          </div>` : ''}
          ${isAdmin && player.photo_url ? `<button onclick="event.stopPropagation();deletePlayerPhoto()" class="photo-del-btn" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(239,62,66,.85);border:none;color:#fff;font-size:11px;cursor:pointer;font-weight:bold;z-index:10;display:none;align-items:center;justify-content:center">✕</button>` : ''}
        </div>

        <!-- Main info -->
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:4px">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                <span style="font-family:var(--font2);font-size:0.62rem;font-weight:800;color:var(--green-light);text-transform:uppercase;letter-spacing:.1em">${player.class||'—'}</span>
                ${tierBadge(player.tier)}
                ${outcomePillLarge(player.outcome)}
              </div>
              <div class="profile-name">${player.name}</div>
            </div>
          </div>
          <div class="profile-school">${player.school||'—'}</div>
          <div class="profile-meta-row">
            <div class="profile-meta-item"><strong>Age:</strong> ${age}</div>
            <div class="profile-meta-item"><strong>DOB:</strong> ${formatDateShort(player.dob)}</div>
            <div class="profile-meta-item"><strong>District:</strong> ${player.district||'—'}</div>
            <div class="profile-meta-item"><strong>Scout:</strong> ${player.scout||'—'}</div>
            <div class="profile-meta-item"><strong>GPHP:</strong> ${player.gphp ? player.gphp+'cm' : '—'}</div>
          </div>
        </div>

        <!-- Right side stats panel (like Mookie Betts) -->
        <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;gap:4px;min-width:160px" class="mob-hide">
          ${[
            ['Nationality', player.nationality||'—'],
            ['Division',    player.division||'—'],
            ['Household',   player.household_id||'—'],
            ['Added',       formatDateShort(player.created_at)],
          ].map(([l,v]) => `
            <div style="font-family:var(--font2);font-size:0.65rem;font-weight:600;color:rgba(255,255,255,0.4)">
              ${l} <strong style="color:rgba(255,255,255,0.8)">${v}</strong>
            </div>`).join('')}
        </div>
      </div>

      <!-- Stats bar -->
      <div class="profile-hero-stats">
        ${[
          ['Velo',  velo,    'mph'],
          ['Broad', broad,   'inches'],
          ['Dash',  dash,    'secs'],
          ['Height', player.height_ft||'—', 'ft'],
          ['Weight', player.weight_lbs||'—','lbs'],
          ['KR',    player.kr||'—',  ''],
        ].map(([l,v,u]) => `
          <div class="hero-stat">
            <div class="hero-stat-val">${v}</div>
            <div class="hero-stat-lbl">${l}${u?' ('+u+')':''}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('profile',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="8" cy="5" r="2.5"/><path d="M3 13c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg>
        Profile
      </button>
      <button class="tab" onclick="showTab('homevisit',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M2 7l6-5 6 5v7H2z"/><rect x="6" y="9" width="4" height="5"/></svg>
        Home Visit
      </button>
      <button class="tab" onclick="showTab('initialtryout',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="8" cy="8" r="6"/><path d="M5 8l2 2 4-4"/></svg>
        Initial Tryout
      </button>
      <button class="tab" onclick="showTab('tryout',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
        Final Tryout
      </button>
      <button class="tab" onclick="showTab('development',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M8 1v14M1 8h14"/></svg>
        Development
      </button>
      <button class="tab" onclick="showTab('reports',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="1" width="10" height="14" rx="1.5"/><path d="M6 5h4M6 8h4M6 11h2"/></svg>
        Reports
      </button>
    </div>

    <!-- TAB 1: PROFILE -->
    <div class="tab-content active" id="tab-profile">
      <div class="grid-2">
        <div class="col-stack">
          <div class="card">
            <div class="card-head">
              <span class="card-title">Player Information</span>
              ${isAdmin ? `<button class="card-action" onclick="editPlayer()">Edit</button>` : ''}
            </div>
            ${infoGrid([
              ['Full Name',      player.name],
              ['Date of Birth',  formatDateShort(player.dob)],
              ['Age',            age + ' years'],
              ['Class',          player.class||'—'],
              ['Gender',         player.gender||'—'],
              ['Nationality',    player.nationality||'—'],
              ['Refugee ID',     player.refugee_id||'—'],
              ['Household ID',   player.household_id||'—'],
            ])}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Genetics</span></div>
            ${infoGrid([
              ['Dad Height',  player.dad_ht ? player.dad_ht+'cm' : '—'],
              ['Mom Height',  player.mom_ht ? player.mom_ht+'cm' : '—'],
              ['GPHP',        player.gphp   ? player.gphp+'cm'  : '—'],
              ['KR',          player.kr||'—'],
            ])}
          </div>
        </div>
        <div class="col-stack">
          <div class="card">
            <div class="card-head"><span class="card-title">School & Location</span></div>
            ${infoGrid([
              ['School',          player.school||'—'],
              ['School Contact',  player.school_contact||'—'],
              ['District',        player.district||'—'],
              ['Division',        player.division||'—'],
              ['Scout',           player.scout||'—'],
            ])}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Parent / Guardian Contacts</span></div>
            ${infoGrid([
              ['Parent 1', player.parent1||'—'],
              ['Parent 2', player.parent2||'—'],
            ])}
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Scout Notes</span></div>
            <p style="font-family:var(--font2);font-size:0.78rem;font-weight:600;color:var(--text);line-height:1.7">
              ${player.notes || '<span style="color:var(--muted)">No notes added.</span>'}
            </p>
          </div>
        </div>
      </div>

      <!-- Comments -->
      <div class="card" style="margin-top:12px">
        <div class="card-head"><span class="card-title">Comments</span></div>
        <div id="commentsList"></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input class="form-input" id="commentInput" type="text"
            placeholder="Add a comment..." style="flex:1"
            onkeydown="if(event.key==='Enter') addComment()">
          <button class="btn btn-green" onclick="addComment()">
            <svg viewBox="0 0 16 16"><path d="M14 1L1 6l5 3 2 5 3-5 3-8z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- TAB 2: HOME VISIT -->
    <div class="tab-content" id="tab-homevisit">
      <div class="grid-2">
        <div class="col-stack">
          <div class="card">
            <div class="card-head">
              <span class="card-title">Home Visit Notes</span>
              ${isAdmin ? `<button class="card-action" onclick="saveHVNotes()">Save</button>` : ''}
            </div>
            <textarea class="form-textarea" id="hvNotes" rows="6"
              placeholder="Notes from the home visit..."
              ${!isAdmin ? 'disabled' : ''}
              style="${!isAdmin ? 'background:var(--bg);cursor:default' : ''}"
            >${homeVisit?.notes||''}</textarea>
          </div>
          <div class="card">
            <div class="card-head"><span class="card-title">Home Visit Details</span></div>
            ${infoGrid([
              ['Visit Date', homeVisit?.visit_date ? formatDateShort(homeVisit.visit_date) : '—'],
              ['Visited by', homeVisit?.visited_by||'—'],
              ['Family size', homeVisit?.family_size||'—'],
              ['Guardian consent', homeVisit?.consent ? 'Yes' : 'No'],
            ])}
            ${isAdmin ? `
            <div style="margin-top:12px">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Visit Date</label>
                  <input class="form-input" id="hvDate" type="date" value="${homeVisit?.visit_date||''}">
                </div>
                <div class="form-group">
                  <label class="form-label">Visited By</label>
                  <input class="form-input" id="hvBy" type="text" value="${homeVisit?.visited_by||''}" placeholder="Name">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Family Size</label>
                  <input class="form-input" id="hvFamily" type="number" value="${homeVisit?.family_size||''}" placeholder="Number of people">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;padding-top:22px">
                  <input type="checkbox" id="hvConsent" ${homeVisit?.consent ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--green)">
                  <label class="form-label" style="margin:0;cursor:pointer" for="hvConsent">Guardian consent obtained</label>
                </div>
              </div>
              <button class="btn btn-green" style="width:100%;margin-top:8px" onclick="saveHomeVisit()">Save Home Visit Info</button>
            </div>` : ''}
          </div>
        </div>
        <div class="col-stack">
          ${isAdmin ? `
          <div class="card">
            <div class="card-head"><span class="card-title">Upload Media</span></div>
            <div class="upload-area" onclick="document.getElementById('mediaUpload').click()">
              <input type="file" id="mediaUpload" accept="image/*,video/*" multiple onchange="uploadMedia(this.files)">
              <svg viewBox="0 0 16 16" style="width:28px;height:28px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 8px">
                <path d="M8 2v8M5 5l3-3 3 3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/>
              </svg>
              <div style="font-family:var(--font2);font-size:0.78rem;font-weight:700;color:var(--muted)">Click to upload photos or videos</div>
              <div style="font-family:var(--font2);font-size:0.65rem;color:var(--muted);margin-top:3px">Videos are compressed to preserve quality</div>
            </div>
          </div>` : ''}
          <div class="card">
            <div class="card-head"><span class="card-title">Photos &amp; Videos</span></div>
            <div class="media-grid" id="mediaGrid">
              <div style="font-family:var(--font2);font-size:0.72rem;color:var(--muted)">Loading media...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB 3: FINAL TRYOUT -->
    <div class="tab-content" id="tab-tryout">
      ${isAdmin ? `
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button class="btn btn-green" onclick="saveTryoutMetrics()">
          <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
          Save Metrics
        </button>
        <button class="btn btn-outline" style="color:var(--green);border-color:var(--green)" onclick="admitPlayer()">
          <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
          Admit Player
        </button>
        <button class="btn btn-outline" style="color:var(--red);border-color:var(--red)" onclick="document.getElementById('eliminateModal').classList.add('open')">
          <svg viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          Eliminate Player
        </button>
      </div>` : ''}

      <!-- Metric display (like Dodgers stats page) -->
      <div id="tryoutDisplay"></div>

      ${isAdmin ? `
      <!-- Metric input form -->
      <div class="card" style="margin-top:14px">
        <div class="card-head"><span class="card-title">Enter / Update Metrics</span></div>

        <div class="metric-section-title">Physical</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Height (ft)</label>

function outcomePillLarge(o) {
  if (!o) return '';
  if (o === 'admitted')   return '<span class="pill pill-green" style="font-size:.65rem">Admitted</span>';
  if (o === 'eliminated') return '<span class="pill pill-red" style="font-size:.65rem">Eliminated</span>';

let initialLoaded = false;
let developmentLoaded = false;
let reportsLoaded = false;

function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tc = document.getElementById('tab-' + id);
  if (tc) tc.classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'tryout')        renderTryoutDisplay();
  if (id === 'initialtryout'  && !initialLoaded)    loadTabMedia('initial', 'initialMediaGrid');
  if (id === 'development'    && !developmentLoaded) loadTabMedia('development', 'developmentMediaGrid');
  if (id === 'reports'        && !reportsLoaded)     loadReportsTab();
}

async function loadTabMedia(tabName, gridId) {
  if (tabName === 'initial')     initialLoaded = true;
  if (tabName === 'development') { developmentLoaded = true; loadDevelopmentTab(); return; }
  const el = document.getElementById(gridId);
  if (!el) return;
  try {
    const r = await apiFetch('/api/players/' + playerId + '/initial-media');
    const media = r.media || [];
    const uploadBtn = isAdmin ? `<label style="cursor:pointer;display:inline-block;margin-bottom:12px"><input type="file" accept="image/*,video/*" multiple style="display:none" onchange="uploadTabMedia('initial',this)"><span class="btn btn-outline" style="display:inline-flex;align-items:center;gap:6px"><svg viewBox="0 0 16 16" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round"><path d="M8 2v8M5 5l3-3 3 3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>Upload Photos / Videos</span></label>` : '';
    if (!media.length) {
      el.innerHTML = uploadBtn + '<div class="empty-state" style="padding:24px"><div class="empty-title">No media yet</div><div class="empty-sub">Upload photos or videos from when you first saw this player.</div></div>';
      return;
    }
    el.innerHTML = uploadBtn + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px" id="mediaGrid_' + tabName + '">' +
      media.map(m => {
        const delbtn = isAdmin
          ? '<button class="media-del-btn" data-id="' + m.id + '" data-tab="' + tabName + '" style="position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:14px;cursor:pointer;font-weight:bold;z-index:10;display:flex;align-items:center;justify-content:center">&times;</button>'
          : '';
        const media_el = m.type === 'video'
          ? '<video src="' + API_BASE + m.url + '" style="width:100%;aspect-ratio:1;object-fit:cover" controls preload="metadata"></video>'
          : '<img src="' + API_BASE + m.url + '" style="width:100%;aspect-ratio:1;object-fit:cover;cursor:zoom-in" loading="lazy">';
        return '<div style="border-radius:10px;overflow:hidden;background:var(--bg);border:1.5px solid var(--border);position:relative">'
          + media_el
          + '<div style="padding:5px 8px;font-family:var(--font2);font-size:0.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (m.filename||'') + '</div>'
          + delbtn
          + '</div>';
      }).join('') + '</div>';

    // Attach delete handlers via event delegation
    setTimeout(() => {
      const grid = document.getElementById('mediaGrid_' + tabName);
      if (!grid) return;
      grid.addEventListener('click', function(e) {
        const btn = e.target.closest('.media-del-btn');
        if (!btn) return;
        e.stopPropagation();
        const mId = btn.getAttribute('data-id');
        const mTab = btn.getAttribute('data-tab');
        deleteTabMedia(mId, mTab);
      });
    }, 100);
  } catch(e) {
    if (el) el.innerHTML = '<div class="empty-state"><div class="empty-title">Could not load media</div></div>';
  }
}

async function deleteTabMedia(mediaId, tab) {
  showConfirmDelete(
    'Delete Media',
    'Are you sure you want to delete this photo or video? This cannot be undone.',
    async () => {
      try {
        const res = await fetch(API_BASE + '/api/players/' + playerId + '/home-visit/media/' + mediaId, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + Auth.token() }
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Delete failed');
        }
        showToast('Media deleted!', 'success');
        if (tab === 'initial')     { initialLoaded = false;     loadTabMedia('initial', 'initialMediaGrid'); }
        if (tab === 'development') { developmentLoaded = false;  loadDevelopmentTab(); }
      } catch(e) { showToast(e.message, 'error'); }
    }
  );
}

async function uploadTabMedia(tab, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  showToast('Uploading...', 'info');
  let ok = 0;
  for (const f of files) {
    const fd = new FormData();
    fd.append('file', f);
    try {
      const res = await fetch(API_BASE + '/api/players/' + playerId + '/media/' + tab, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + Auth.token() },
        body: fd,
      });
      if (res.ok) ok++;
    } catch(e) {}
  }
  if (ok > 0) {
    showToast(ok + ' file' + (ok > 1 ? 's' : '') + ' uploaded!', 'success');
    if (tab === 'initial')     { initialLoaded = false;     loadTabMedia('initial', 'initialMediaGrid'); }
    if (tab === 'development') { developmentLoaded = false;  loadTabMedia('development', 'developmentMediaGrid'); }
  } else {
    showToast('Upload failed', 'error');
  }
}

async function saveReport() {
  const title = document.getElementById('rptTitle')?.value.trim();
  const body  = document.getElementById('rptBody')?.value.trim();
  const files = document.getElementById('rptFiles')?.files;
  if (!title) { showToast('Please add a title.', 'error'); return; }
  try {
    const fd = new FormData();
    fd.append('title', title);
    if (body) fd.append('body', body);
    if (files) Array.from(files).forEach(f => fd.append('files', f));
    const res = await fetch(API_BASE + '/api/players/' + playerId + '/reports', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + Auth.token() },
      body: fd,
    });
    if (!res.ok) throw new Error('Failed to save');
    document.getElementById('rptTitle').value = '';
    document.getElementById('rptBody').value = '';
    document.getElementById('rptFiles').value = '';
    document.getElementById('rptFilesLbl').textContent = 'No files selected';
    showToast('Report saved!', 'success');
    reportsLoaded = false;
    loadReportsList();
  } catch(e) { showToast(e.message, 'error'); }
}

function renderMedia() {
  const el = document.getElementById('mediaGrid');
  if (!el) return;
  const media = homeVisit?.media || [];
  if (!media.length) {
    el.innerHTML = '<div style="font-family:var(--font2);font-size:0.72rem;color:var(--muted)">No media uploaded yet.</div>';
    return;
  }
  el.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px" id="homeVisitMediaGrid">'
    + media.map(m => {
        const delbtn = isAdmin
          ? '<button class="hv-del-btn" data-id="' + m.id + '" style="position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:14px;cursor:pointer;font-weight:bold;z-index:10;display:flex;align-items:center;justify-content:center">&times;</button>'
          : '';

          ? '<video src="' + (API_BASE + m.url) + '" style="width:100%;aspect-ratio:1;object-fit:cover" controls preload="metadata"></video>'
          : '<img src="' + (API_BASE + m.url) + '" style="width:100%;aspect-ratio:1;object-fit:cover;cursor:zoom-in" loading="lazy">';

          + delbtn
          + '</div>';
      }).join('')
    + '</div>';

  // Event delegation for home visit media delete
  setTimeout(() => {
    const grid = document.getElementById('homeVisitMediaGrid');
    if (!grid) return;
    grid.addEventListener('click', function(e) {
      const btn = e.target.closest('.hv-del-btn');
      if (!btn) return;
      e.stopPropagation();
      const mId = btn.getAttribute('data-id');
      showConfirmDelete('Delete Media', 'Are you sure you want to delete this photo or video? This cannot be undone.', async () => {

          await HomeVisitAPI.deleteMedia(playerId, mId);

          renderMedia();
          showToast('Media deleted!', 'success');
        } catch(e) { showToast(e.message, 'error'); }
      });
    });
  }, 100);
}

async function uploadMedia(files) {
  if (!files || !files.length) return;
  showToast('Uploading...', 'info', 10000);
  try {
    for (const file of files) {
      const type = file.type.startsWith('video/') ? 'video' : 'image';
      const res  = await HomeVisitAPI.uploadMedia(playerId, file, type);
      if (!homeVisit.media) homeVisit.media = [];
      homeVisit.media.push(res.media);
    }
    renderMedia();
    showToast('Uploaded!', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

function statBox(label, avgVal, unit, a1, a2, a3) {
  const attempts = [a1, a2, a3].filter(v => v != null && v !== '');
  return `
    <div class="tryout-stat-box">
      <div class="tsb-label">${label}</div>
      <div class="tsb-val">${avgVal}</div>
      <div class="tsb-unit">${unit} avg</div>
      ${attempts.length ? `<div class="tsb-attempts">
        ${attempts.map(a => `<div class="tsb-attempt">${a}</div>`).join('')}
      </div>` : ''}
    </div>`;
}

function singleStatBox(label, val, unit) {
  return `
    <div class="tryout-stat-box">
      <div class="tsb-label">${label}</div>
      <div class="tsb-val">${val}</div>
      <div class="tsb-unit">${unit}</div>

}

  document.getElementById('epParent1').value       = p.parent1 || '';
  document.getElementById('epParent2').value       = p.parent2 || '';
  document.getElementById('epHousehold').value     = p.household_id || '';
  document.getElementById('epRefugee').value       = p.refugee_id || '';
  document.getElementById('epDadHt').value         = p.dad_ht || '';
  document.getElementById('epMomHt').value         = p.mom_ht || '';
  document.getElementById('epTier').value          = p.tier || '';
  document.getElementById('epScout').value         = p.scout || '';
  document.getElementById('epKR').value            = p.kr || '';
  document.getElementById('epNotes').value         = p.notes || '';
  // Populate district select
  const ds = document.getElementById('epDistrict');
  ds.innerHTML = '<option value="">Select district</option>';
  UGANDA_DISTRICTS.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    if (d === p.district) o.selected = true;
    ds.appendChild(o);
  });
  updateEditGPHP();
  document.getElementById('editPlayerModal').classList.add('open');
}

function updateEditGPHP() {
  const dad = parseFloat(document.getElementById('epDadHt').value);
  const mom = parseFloat(document.getElementById('epMomHt').value);
  const gender = document.getElementById('epGender').value;
  const el = document.getElementById('epGPHP');
  if (!dad || !mom) { el.textContent = 'Set parent heights'; el.style.color = 'var(--muted)'; return; }
  const gphp = gender === 'F' ? ((dad + mom - 13) / 2).toFixed(1) : ((dad + mom + 13) / 2).toFixed(1);
  el.textContent = gphp + ' cm projected';
  el.style.color = 'var(--green-dark)';
}

async function saveEditPlayer() {
  const btn = document.getElementById('epSaveBtn');
  btn.disabled = true;
  try {
    const updated = {
      name:           document.getElementById('epName').value.trim(),
      dob:            document.getElementById('epDob').value || null,
      class:          document.getElementById('epClass').value.trim(),
      gender:         document.getElementById('epGender').value,
      nationality:    document.getElementById('epNationality').value.trim(),
      district:       document.getElementById('epDistrict').value.trim(),
      division:       document.getElementById('epDivision').value.trim(),
      school:         document.getElementById('epSchool').value.trim(),
      school_contact: document.getElementById('epSchoolContact').value.trim(),
      parent1:        document.getElementById('epParent1').value.trim(),
      parent2:        document.getElementById('epParent2').value.trim(),
      household_id:   document.getElementById('epHousehold').value.trim(),
      refugee_id:     document.getElementById('epRefugee').value.trim(),
      dad_ht:         document.getElementById('epDadHt').value || null,
      mom_ht:         document.getElementById('epMomHt').value || null,
      tier:           document.getElementById('epTier').value || null,
      scout:          document.getElementById('epScout').value.trim(),
      kr:             document.getElementById('epKR').value.trim(),
      notes:          document.getElementById('epNotes').value.trim(),
    };
    // Recalculate GPHP
    if (updated.dad_ht && updated.mom_ht) {
      const adj = updated.gender === 'F' ? -13 : 13;
      updated.gphp = ((parseFloat(updated.dad_ht) + parseFloat(updated.mom_ht) + adj) / 2).toFixed(1);
    }
    const r = await PlayerAPI.update(playerId, updated);
    Object.assign(player, r.player || updated);
    document.getElementById('editPlayerModal').classList.remove('open');
    renderProfile();
    showToast('Player updated!', 'success');
  } catch(e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; }
}

      apiFetch('/api/players/' + playerId + '/comments'),

  const p   = player;

  const photoSrc = p.photo_url ? (p.photo_url.startsWith('http') ? p.photo_url : API_BASE + p.photo_url) : null;
  const today = new Date().toLocaleDateString('en-UG', { day:'numeric', month:'long', year:'numeric' });
  const tierColors = { '1':'#009c41','1.5':'#7dbf3a','2':'#f5a623','3':'#e53935' };
  const tierColor  = tierColors[String(p.tier)] || '#888';
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'}) : '—';
  const ini = (name) => (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const infoRow = (l,v) => '<div class="info-row"><span class="info-lbl">'+l+'</span><span class="info-val">'+(v||'—')+'</span></div>';

  const css = `
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Nunito,sans-serif; color:#00254D; background:#fff; font-size:11pt; }
    .hdr { background:#003A6B; color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size:20pt; font-weight:900; color:#fff; }
    .logo span { font-size:8pt; display:block; color:rgba(255,255,255,.5); letter-spacing:.05em; margin-top:1px; }
    .hero { background:#00254D; padding:14px 24px; display:flex; gap:16px; }
    .photo { width:80px; height:80px; border-radius:10px; background:#003A6B; border:2px solid rgba(179,212,240,.2); display:flex; align-items:center; justify-content:center; font-size:22pt; font-weight:900; color:#b3d4f0; flex-shrink:0; overflow:hidden; }
    .photo img { width:100%; height:100%; object-fit:cover; }
    .pname { font-size:20pt; font-weight:900; color:#fff; margin-bottom:3px; }
    .pschool { font-size:10pt; color:#b3d4f0; margin-bottom:8px; }
    .pmeta { display:flex; gap:12px; flex-wrap:wrap; }
    .pmeta-i { font-size:8.5pt; color:rgba(255,255,255,.5); }
    .pmeta-i strong { color:rgba(255,255,255,.85); }
    .tbadge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:8pt; font-weight:800; color:#fff; margin-right:6px; }
    .statsbar { display:flex; background:#001A3A; border-top:1px solid rgba(255,255,255,.08); }
    .stat { flex:1; padding:7px; text-align:center; border-right:1px solid rgba(255,255,255,.08); }
    .stat:last-child { border-right:none; }
    .sval { font-size:14pt; font-weight:900; color:#fff; }
    .slbl { font-size:7pt; font-weight:700; color:rgba(255,255,255,.35); text-transform:uppercase; letter-spacing:.07em; margin-top:2px; }
    .sec { padding:10px 24px; border-bottom:1px solid #e6f0fa; }
    .sec-title { font-size:11pt; font-weight:900; color:#003A6B; margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid #005A9C; display:flex; align-items:center; gap:8px; }
    .sec-title::before { content:''; display:inline-block; width:4px; height:16px; background:#EF3E42; border-radius:2px; }
    .igrid { display:grid; grid-template-columns:1fr 1fr; gap:6px 20px; }
    .info-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #e6f0fa; }
    .info-lbl { font-size:8.5pt; font-weight:700; color:#5B7A96; }
    .info-val { font-size:8.5pt; font-weight:800; color:#00254D; text-align:right; }
    .mgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .mbox { background:#f4f7fb; border:1px solid #d8e4f0; border-radius:8px; padding:10px; text-align:center; }
    .mval { font-size:14pt; font-weight:900; color:#00254D; }
    .mlbl { font-size:7pt; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#5B7A96; }
    .cmt { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #e6f0fa; }
    .cava { width:28px; height:28px; border-radius:50%; background:#003A6B; display:flex; align-items:center; justify-content:center; font-size:8pt; font-weight:800; color:#b3d4f0; flex-shrink:0; }
    .cauth { font-size:8.5pt; font-weight:800; color:#00254D; }
    .ctime { font-size:7.5pt; color:#5B7A96; margin-left:6px; }
    .cbody { font-size:8.5pt; color:#00254D; line-height:1.6; margin-top:2px; }
    .rcard { background:#f4f7fb; border:1px solid #d8e4f0; border-radius:8px; padding:12px; margin-bottom:8px; }
    .rtitle { font-size:10pt; font-weight:800; color:#00254D; margin-bottom:2px; }
    .rmeta { font-size:7.5pt; color:#5B7A96; margin-bottom:6px; }
    .rbody { font-size:8.5pt; color:#00254D; line-height:1.7; white-space:pre-line; }
    .ftr { background:#f4f7fb; border-top:2px solid #005A9C; padding:10px 24px; display:flex; justify-content:space-between; }
    .ftr-l, .ftr-r { font-size:7.5pt; color:#5B7A96; }
    .ftr-r { text-align:right; }
    .pbtn { position:fixed; bottom:24px; right:24px; background:#005A9C; color:#fff; border:none; border-radius:10px; padding:12px 22px; font-family:Nunito,sans-serif; font-size:11pt; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(0,90,156,.4); }
    .content-wrap { min-height:calc(100vh - 120px); }
    @media print {
      .pbtn { display:none !important; }
      body { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .pgbrk { page-break-before:always; }
      html, body { height:100%; }
      .page-wrap { min-height:100vh; display:flex; flex-direction:column; }
      .content-wrap { flex:1; }
    }
  `;

  const parts = [];
  parts.push('<!DOCTYPE html><html><head><meta charset="UTF-8">');
  parts.push('<title>' + p.name + ' — BTID Scouting Report</title>');
  parts.push('<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">');
  parts.push('<style>' + css + '</style></head>');
  parts.push('<body><div class="page-wrap">');

  // Print button
  parts.push('<button class="pbtn" onclick="window.print()">🖨 Print / Save PDF</button>');
  parts.push('<div class="content-wrap">');

  // Header
  parts.push('<div class="hdr"><div class="logo">BTID <span>Baseball Talent ID &amp; Development · LA Dodgers Africa</span></div><div style="font-size:8pt;color:rgba(255,255,255,.5);text-align:right"><strong style="display:block;color:rgba(255,255,255,.8)">Scouting Report</strong>Generated ' + today + '</div></div>');

  // Hero
  const photoHtml = photoSrc
    ? '<div class="photo"><img src="' + photoSrc + '"></div>'
    : '<div class="photo">' + ini(p.name) + '</div>';
  const tierHtml = p.tier ? '<span class="tbadge" style="background:' + tierColor + '">' + (p.tier==='1.5'?'T1.5':'T'+p.tier) + '</span>' : '';
  const outcomeHtml = p.outcome === 'admitted' ? '<span style="background:rgba(0,156,65,.25);color:#4dd882;font-size:8pt;font-weight:800;padding:3px 10px;border-radius:6px">✓ Admitted</span>'
    : p.outcome === 'eliminated' ? '<span style="background:rgba(239,62,66,.25);color:#ff7b7e;font-size:8pt;font-weight:800;padding:3px 10px;border-radius:6px">✗ Eliminated</span>'
    : '<span style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:8pt;font-weight:800;padding:3px 10px;border-radius:6px">Pending</span>';

  parts.push('<div class="hero">' + photoHtml + '<div style="flex:1"><div style="display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap"><span style="font-size:8pt;font-weight:800;color:#b3d4f0;text-transform:uppercase">' + (p.class||'—') + '</span>' + tierHtml + outcomeHtml + '</div><div class="pname">' + p.name + '</div><div class="pschool">' + (p.school||'—') + '</div><div class="pmeta"><div class="pmeta-i">Age <strong>' + age + '</strong></div><div class="pmeta-i">DOB <strong>' + fmtDate(p.dob) + '</strong></div><div class="pmeta-i">District <strong>' + (p.district||'—') + '</strong></div><div class="pmeta-i">Scout <strong>' + (p.scout||'Joshua M.') + '</strong></div>' + (p.gphp ? '<div class="pmeta-i">GPHP <strong>' + p.gphp + 'cm</strong></div>' : '') + '</div></div><div style="text-align:right;font-size:8pt;color:rgba(255,255,255,.4)">Nationality <strong style="color:rgba(255,255,255,.75)">' + (p.nationality||'Ugandan') + '</strong><br>Household <strong style="color:rgba(255,255,255,.75)">' + (p.household_id||'—') + '</strong></div></div>');

  // Stats bar
  parts.push('<div class="statsbar">');
  [['Velocity',(p.velo||'—')+' mph'],['Height',p.height_ft||'—'],['Weight',(p.weight_lbs||'—')+' lbs'],['GPHP',(p.gphp||'—')+' cm'],['KR',p.kr||'—']]
    .forEach(([l,v]) => parts.push('<div class="stat"><div class="sval">'+v+'</div><div class="slbl">'+l+'</div></div>'));
  parts.push('</div>');

  // Player info
  parts.push('<div class="sec"><div class="sec-title">Player Information</div><div class="igrid"><div>');
  [[' Full Name',p.name],['Date of Birth',fmtDate(p.dob)],['Age',age+' years'],['Class',p.class||'—'],['Gender',p.gender||'—'],['Nationality',p.nationality||'Ugandan']]
    .forEach(([l,v]) => parts.push(infoRow(l,v)));
  parts.push('</div><div>');
  [['School',p.school||'—'],['District',p.district||'—'],['Division',p.division||'—'],['School Contact',p.school_contact||'—'],['Parent 1',p.parent1||'—'],['Parent 2',p.parent2||'—']]
    .forEach(([l,v]) => parts.push(infoRow(l,v)));
  parts.push('</div></div></div>');

  // Genetics
  parts.push('<div class="sec"><div class="sec-title">Genetics</div><div class="igrid"><div>');
  [['Dad Height',p.dad_ht?(p.dad_ht+'cm'):'—'],['Mom Height',p.mom_ht?(p.mom_ht+'cm'):'—'],['GPHP (Projected)',p.gphp?(p.gphp+'cm'):'—']]
    .forEach(([l,v]) => parts.push(infoRow(l,v)));
  parts.push('</div><div style="padding:8px;background:#f4f7fb;border-radius:8px;font-size:8.5pt;color:#5B7A96;line-height:1.7"><strong style="color:#00254D;display:block;margin-bottom:4px">What is GPHP?</strong>Genetic Projected Height Potential. Boys: (Dad + Mom + 13cm) ÷ 2. Girls: (Dad + Mom − 13cm) ÷ 2.</div></div></div>');

  // Tryout metrics - only show if we have attempt/detailed data beyond what's in stats bar
  if (p.broad || p.dash || p.velo_st_avg) {
    parts.push('<div class="sec"><div class="sec-title">Tryout Metrics</div><div class="mgrid">');
    [['Velocity',(p.velo||'—'),'mph'],['Broad Jump',(p.broad||'—'),'inches'],['Dash',(p.dash||'—'),'secs'],['KR',p.kr||'—','']]
      .forEach(([l,v,u]) => parts.push('<div class="mbox"><div class="mlbl">'+l+'</div><div class="mval">'+v+'</div><div class="mlbl">'+u+'</div></div>'));
    parts.push('</div></div>');
  }

  // Scout notes
  if (p.notes) parts.push('<div class="sec"><div class="sec-title">Scout Notes</div><div style="font-size:9pt;line-height:1.8;color:#00254D;white-space:pre-line">'+p.notes+'</div></div>');

  // Comments
  if (comments.length) {
    parts.push('<div class="sec"><div class="sec-title">Scout Comments</div>');
    comments.forEach(c => parts.push('<div class="cmt"><div class="cava">'+ini(c.author_name)+'</div><div><div><span class="cauth">'+(c.author_name||'Unknown')+'</span><span class="ctime">'+fmtDate(c.created_at)+'</span></div><div class="cbody">'+c.text+'</div></div></div>'));
    parts.push('</div>');
  }

  // Reports
  if (reports.length) {
    parts.push('<div class="sec"><div class="sec-title">Reports</div>');
    reports.forEach(r => parts.push('<div class="rcard"><div class="rtitle">'+r.title+'</div><div class="rmeta">By '+(r.author_name||'—')+' · '+fmtDate(r.created_at)+'</div>'+(r.body?'<div class="rbody">'+r.body.replace(/<[^>]*>/g,'')+'</div>':'')+'</div>'));
    parts.push('</div>');
  }

  // Footer
  parts.push('</div>'); // close content-wrap
  parts.push('<div class="ftr"><div class="ftr-l"><strong>BTID — Baseball Talent Identification &amp; Development</strong><br>LA Dodgers Africa Development Program · Joshua Muwanguzi, Head Scout Uganda</div><div class="ftr-r"><strong>Confidential</strong><br>Generated ' + today + '</div></div>');
  parts.push('</div></body></html>'); // close page-wrap

  const html = parts.join('\n');
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.addEventListener('load', () => setTimeout(() => win.print(), 600));
  setTimeout(() => { try { win.print(); } catch(e) {} }, 1500);
}

// ── EXPORT PDF ────────────────────────────────────────────────────

async function generateShareLink() {
  const hours = document.getElementById('shareExpiry').value;
  const btn   = document.getElementById('generateShareBtn');
  btn.disabled = true; btn.textContent = 'Generating...';
  try {
    const res = await apiFetch('/api/players/' + playerId + '/share', {
      method: 'POST',
      body: { expires_hours: parseInt(hours) }
    });
    const url = window.location.origin + '/shared.html?token=' + res.token;
    document.getElementById('shareUrl').value = url;
    document.getElementById('shareResult').style.display = '';
    const expDate = new Date(res.expires_at);
    document.getElementById('shareExpLabel').textContent =
      'Expires: ' + expDate.toLocaleString('en-UG', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    showToast('Share link generated!', 'success');
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16"><circle cx="12" cy="4" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="12" cy="12" r="2"/><path d="M6 7l4-2M6 9l4 2"/></svg>Generate Link';
  }
}

function copyShareLink() {
  const input = document.getElementById('shareUrl');
  input.select();
  navigator.clipboard.writeText(input.value)
    .then(() => showToast('Link copied!', 'success'))
    .catch(() => { input.select(); document.execCommand('copy'); showToast('Link copied!', 'success'); });
}
</script>

<!-- Confirm Delete Modal -->
<div class="modal-bg" id="confirmDeleteModal">
  <div class="modal-card" style="max-width:380px">
    <div class="modal-head">
      <div class="modal-title" id="confirmDeleteTitle">Delete Media</div>
      <button class="modal-close" onclick="closeConfirmDelete()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-family:var(--font2);font-size:0.82rem;font-weight:600;color:var(--muted);line-height:1.6" id="confirmDeleteMsg">
        Are you sure you want to delete this? This cannot be undone.
      </p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeConfirmDelete()">Cancel</button>
      <button class="btn btn-red" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script>
// ── CONFIRM DELETE MODAL ──────────────────────────────────────────
function showConfirmDelete(title, msg, onConfirm) {
  document.getElementById('confirmDeleteTitle').textContent = title;
  document.getElementById('confirmDeleteMsg').textContent   = msg;
  document.getElementById('confirmDeleteModal').classList.add('open');
  const btn = document.getElementById('confirmDeleteBtn');
  btn.onclick = () => { closeConfirmDelete(); onConfirm(); };
}
function closeConfirmDelete() {
  document.getElementById('confirmDeleteModal').classList.remove('open');
}
document.getElementById('confirmDeleteModal').addEventListener('click', e => {
  if (e.target.id === 'confirmDeleteModal') closeConfirmDelete();
});
</script>
