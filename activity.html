<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login Activity — BTID</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()"><svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg></button>
        <div>
          <div class="topbar-title">Login Activity</div>
          <div class="topbar-sub" id="countLabel">Track every login to the system</div>
        </div>
      </div>
      <div class="topbar-right">
        <select class="filter-select" id="filterRole" onchange="filterLogs()">
          <option value="">All roles</option>
          <option value="joshua">Joshua</option>
          <option value="scout">Scouts</option>
        </select>
      </div>
    </div>

    <div class="content">
      <!-- Summary -->
      <div class="metrics-grid" style="margin-bottom:14px" id="activityStats"></div>

      <!-- Log table -->
      <div class="card">
        <div class="card-head"><span class="card-title">All Login Events</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>User</th><th>Role</th><th>Time</th><th>IP Address</th><th>Device</th>
            </tr></thead>
            <tbody id="logsBody">
              <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="js/app.js"></script>
<script>
Auth.require();
buildSidebar('activity');

let allLogs = [];

async function loadActivity() {
  try {
    const r = await ActivityAPI.getAll({ limit: 200 });
    allLogs  = r.logs || r || [];
  } catch(e) { allLogs = []; }
  renderStats();
  filterLogs();
}

function renderStats() {
  const total   = allLogs.length;
  const today   = allLogs.filter(l => new Date(l.created_at).toDateString() === new Date().toDateString()).length;
  const unique  = new Set(allLogs.map(l => l.user_id)).size;
  const scouts  = allLogs.filter(l => l.role === 'scout').length;

  document.getElementById('activityStats').innerHTML = [
    { label:'Total Logins',    val: fmt(total)  },
    { label:'Logins Today',    val: fmt(today)  },
    { label:'Unique Users',    val: fmt(unique) },
    { label:'Scout Logins',    val: fmt(scouts) },
  ].map(s => `
    <div class="metric-card">
      <div class="mc-value">${s.val}</div>
      <div class="mc-label">${s.label}</div>
    </div>`).join('');
}

function filterLogs() {
  const role = document.getElementById('filterRole').value;
  let list   = allLogs;
  if (role)  list = list.filter(l => l.role === role);

  document.getElementById('countLabel').textContent =
    list.length + ' login event' + (list.length !== 1 ? 's' : '');

  const tbody = document.getElementById('logsBody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">No login events found.</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(l => {
    const roleColor = l.role === 'joshua' || l.role === 'admin'
      ? 'var(--green-dark)' : 'var(--muted)';
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--green-dark);display:flex;align-items:center;justify-content:center;font-family:var(--font1);font-size:.6rem;color:var(--green-light);flex-shrink:0">
            ${initials(l.name||l.username||'?')}
          </div>
          <div style="font-family:var(--font2);font-size:.78rem;font-weight:800;color:var(--text)">${l.name||l.username}</div>
        </div>
      </td>
      <td><span style="font-family:var(--font2);font-size:.68rem;font-weight:800;color:${roleColor};text-transform:capitalize">${l.role}</span></td>
      <td style="font-family:var(--font2);font-size:.72rem;color:var(--text)">${new Date(l.created_at).toLocaleString('en-UG',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
      <td style="font-family:var(--font2);font-size:.72rem;color:var(--muted);font-family:monospace">${l.ip||'—'}</td>
      <td style="font-family:var(--font2);font-size:.68rem;color:var(--muted);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.user_agent ? l.user_agent.split(' ')[0] : '—'}</td>
    </tr>`;
  }).join('');
}

loadActivity();
</script>
</body>
</html>
